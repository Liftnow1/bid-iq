<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Liftnow Agents · Your Marketing Team</title>
<meta name="build" content="dash-bright-2026-05-29-v7-cond-history">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg-top:#e7f0ff; --bg:#f3f7fc; --card:#ffffff;
    --border:#e6ebf3; --border-soft:#f0f4f9;
    --ink:#162038; --muted:#5a6577; --faint:#94a0b3;
    --accent:#2f6bff; --accent-soft:#e4ecff; --accent-ink:#1b4fd6;
    --ok:#15a34a; --ok-bright:#22c55e; --ok-soft:#dcfce7; --ok-ink:#107a38;
    --warn:#e3870c; --warn-soft:#fff0d4; --warn-ink:#b56a00;
    --err:#ef4444; --err-soft:#ffe4e6; --err-ink:#d12f3e;
    --shadow:0 1px 2px rgba(22,32,58,.05), 0 6px 18px rgba(22,32,58,.06);
    --shadow-lg:0 14px 40px rgba(22,32,58,.16);
    --shadow-hover:0 12px 30px rgba(47,107,255,.16);
    --radius:18px; --radius-sm:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 360px);
    background-attachment:fixed; background-repeat:no-repeat; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15.5px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  a{color:var(--accent-ink); text-decoration:none; font-weight:600}
  a:hover{text-decoration:underline}
  button{font-family:inherit; cursor:pointer}

  /* ---------- Animations ---------- */
  @keyframes cardIn{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
  @keyframes fadeUp{from{opacity:0} to{opacity:1}}
  @keyframes fadeIn{from{opacity:0} to{opacity:1}}
  @keyframes popIn{0%{opacity:0; transform:scale(.4)} 60%{opacity:1; transform:scale(1.12)} 100%{transform:scale(1)}}
  @keyframes floaty{0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)}}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(34,197,94,.45)} 70%{box-shadow:0 0 0 9px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes flyout{to{opacity:0; transform:translateX(40px) scale(.96)}}
  @keyframes approveFlash{0%{background:var(--ok-soft)} 100%{background:var(--card)}}
  @keyframes successPop{0%{opacity:0; transform:translate(-50%,-50%) scale(.3)} 55%{opacity:1; transform:translate(-50%,-50%) scale(1.15)} 100%{opacity:0; transform:translate(-50%,-50%) scale(1)}}
  @keyframes sparkFly{to{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.4) rotate(var(--dr))}}
  .anim-in{animation:fadeUp .32s cubic-bezier(.2,.7,.3,1) both}

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:50; background:rgba(255,255,255,.95);
    backdrop-filter:saturate(180%) blur(10px); border-bottom:1px solid var(--border);
    box-shadow:0 2px 14px rgba(22,32,58,.05);
  }
  .head-row{
    max-width:940px; margin:0 auto; padding:16px 22px 0;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:11px; margin-right:auto}
  .brand .mark{
    width:38px; height:38px; border-radius:11px; flex-shrink:0; font-size:21px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg, #2f6bff, #5b8cff); box-shadow:0 6px 16px rgba(47,107,255,.32);
  }
  .brand .logo{font-size:20px; font-weight:800; letter-spacing:-.02em; line-height:1.1}
  .brand .logo b{color:var(--accent)}
  .brand .tag{font-size:12.5px; color:var(--faint); font-weight:600; display:block; margin-top:1px}
  .pulse{
    display:flex; align-items:center; gap:12px; font-size:13px; color:var(--muted);
    flex-wrap:wrap;
  }
  .pulse .big{font-weight:800; color:var(--ink)}
  .pulse .dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle}
  .pulse .dot.beat{animation:ring 2s infinite}
  .pulse .sep{color:var(--border)}
  .pulse .refresh{
    background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:6px 12px;
    color:var(--muted); font-size:12.5px; font-weight:700; transition:.14s;
  }
  .pulse .refresh:hover{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
  .pulse .refresh:active{transform:scale(.96)}
  .kill{
    background:#fff; border:1.5px solid var(--err-soft); color:var(--err-ink); border-radius:10px;
    padding:6px 12px; font-size:12.5px; font-weight:700; transition:.14s;
  }
  .kill:hover{background:var(--err-soft)}
  .kill:active{transform:scale(.96)}
  .tabs{
    max-width:940px; margin:0 auto; padding:14px 22px 14px; display:flex; gap:8px;
  }
  .tab{
    background:#fff; border:1.5px solid var(--border); padding:10px 20px; font-size:14.5px; font-weight:700;
    color:var(--muted); border-radius:999px; transition:.16s cubic-bezier(.2,.7,.3,1); position:relative;
  }
  .tab:hover{color:var(--ink); border-color:#cfd9e8; transform:translateY(-1px)}
  .tab.active{color:#fff; background:linear-gradient(135deg, #2f6bff, #4b80ff); border-color:transparent; box-shadow:0 6px 16px rgba(47,107,255,.32)}
  .tab .badge{
    display:inline-block; min-width:20px; padding:0 6px; margin-left:7px; height:20px; line-height:20px;
    background:var(--err); color:#fff; border-radius:10px; font-size:11.5px; font-weight:800; text-align:center;
    vertical-align:1px; box-shadow:0 2px 6px rgba(239,68,68,.4);
  }
  .tab.active .badge{background:rgba(255,255,255,.28); box-shadow:none}
  .tab .badge.zero{display:none}

  /* ---------- Layout ---------- */
  main{max-width:940px; margin:0 auto; padding:26px 22px 70px}
  .section-head{display:flex; align-items:baseline; gap:12px; margin:6px 2px 6px; flex-wrap:wrap}
  .section-head h2{font-size:25px; margin:0; letter-spacing:-.02em; font-weight:800}
  .section-head .hint{font-size:14px; color:var(--muted); font-weight:500}
  .lead{font-size:15px; color:var(--muted); margin:2px 2px 22px; max-width:700px}

  /* ---------- Now: action cards ---------- */
  .queue-summary{
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:linear-gradient(135deg, #ffffff, #f3f7ff);
    border:1.5px solid var(--accent-soft); border-radius:var(--radius);
    padding:18px 22px; margin-bottom:22px; box-shadow:var(--shadow);
  }
  .queue-summary .num{font-size:38px; font-weight:800; line-height:1; color:var(--accent-ink); letter-spacing:-.02em}
  .queue-summary .stat{display:flex; align-items:center; gap:9px}
  .queue-summary .stat .lbl{font-size:14px; color:var(--muted); font-weight:600}
  .queue-summary .pill-grp{display:flex; gap:8px; flex-wrap:wrap; margin-left:auto}
  .group-label{
    display:flex; align-items:center; gap:10px; font-size:13px; font-weight:800;
    letter-spacing:-.01em; color:var(--ink); margin:26px 2px 12px;
  }
  .group-label .gl-emoji{font-size:16px}
  .group-label::after{content:""; flex:1; height:2px; border-radius:2px; background:var(--border-soft)}

  .card{
    background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
    margin-bottom:14px; box-shadow:var(--shadow); overflow:hidden; position:relative;
    transition:box-shadow .2s, transform .2s, border-color .2s, opacity .25s;
    animation:cardIn .4s cubic-bezier(.2,.7,.3,1) both;
  }
  .card:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px); border-color:#d4e0f5}
  .card.hi{border-left:5px solid var(--err)}
  .card.med{border-left:5px solid var(--warn)}
  .card.fading{animation:flyout .26s ease forwards; pointer-events:none}
  .card.approving{animation:approveFlash .9s ease forwards}
  .card.focused{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft), var(--shadow)}
  /* collapse mechanics: collapsed shows head+preview+actions; expanded swaps preview for full detail */
  .card.collapsed .card-detail{display:none}
  .card:not(.collapsed) .card-preview{display:none}
  .card-head{
    display:flex; align-items:center; gap:11px; padding:16px 18px 13px; cursor:pointer;
    flex-wrap:wrap;
  }
  .card-head:hover{background:#f8fbff}
  .card-head .chev{
    order:99; margin-left:2px; color:var(--accent); font-size:17px; line-height:1; flex-shrink:0;
    transition:transform .18s ease, color .18s; transform:rotate(0deg); font-weight:800;
  }
  .card:not(.collapsed) .card-head .chev{transform:rotate(90deg)}
  .card-preview{
    width:100%; padding:0 18px; margin:-4px 0 16px; color:var(--muted); font-size:14px; line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; overflow-wrap:break-word;
  }
  .agent-chip{
    display:inline-flex; align-items:center; gap:7px; font-size:13.5px; font-weight:700;
    padding:5px 12px; border-radius:999px; white-space:nowrap;
  }
  .agent-chip .emoji{font-size:15px}
  .prio{
    font-size:11px; font-weight:800; letter-spacing:.02em; padding:4px 10px; border-radius:999px;
    text-transform:uppercase; white-space:nowrap;
  }
  .prio.HIGH{background:var(--err-soft); color:var(--err-ink)}
  .prio.MEDIUM{background:var(--warn-soft); color:var(--warn-ink)}
  .prio.LOW{background:#eef2f8; color:var(--muted)}
  .card-subject{font-weight:750; flex:1; min-width:200px; font-size:16.5px; color:var(--ink); line-height:1.3; letter-spacing:-.01em}
  .card-age{font-size:12.5px; color:var(--faint); white-space:nowrap; font-weight:600}
  .card-age.old{color:var(--warn-ink); font-weight:700}
  .proof-row{
    display:flex; gap:9px; flex-wrap:wrap; padding:0 18px 14px;
  }
  .proof{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700;
    padding:7px 13px; border-radius:10px; border:1.5px solid var(--accent-soft); background:#f5f9ff;
    color:var(--accent-ink); transition:.14s;
  }
  .proof:hover{background:var(--accent-soft); border-color:var(--accent); text-decoration:none; transform:translateY(-1px)}
  .proof.muted{color:var(--muted)}
  .proof .ext{font-size:11px; opacity:.7}
  .card-body{padding:2px 18px 16px; font-size:14.5px}
  .card-body .section{margin:12px 0}
  .card-body .section-label{font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:var(--accent-ink); margin-bottom:4px}
  .card-body .section-body{white-space:pre-wrap; color:var(--ink); line-height:1.6}
  .card-body .section-approve{margin:12px 0; padding:12px 14px; background:var(--ok-soft); border-radius:12px}
  .card-body .section-approve .section-label{color:var(--ok-ink)}
  .card-body .section-reject{margin:12px 0; padding:12px 14px; background:var(--err-soft); border-radius:12px}
  .card-body .section-reject .section-label{color:var(--err-ink)}
  .card-body details{margin-top:10px}
  .card-body summary{cursor:pointer; color:var(--accent-ink); font-size:12.5px; font-weight:700}
  .card-body pre{
    white-space:pre-wrap; word-break:break-word; background:#f5f8fc; border:1.5px solid var(--border-soft);
    border-radius:10px; padding:11px; font-size:12.5px; margin:8px 0 0; max-height:260px; overflow:auto;
  }
  .actions{display:flex; gap:10px; flex-wrap:wrap; padding:15px 18px 17px; align-items:center; border-top:1.5px solid var(--border-soft); background:#fbfcfe}
  .btn{
    border:1.5px solid var(--border); background:#fff; color:var(--ink); border-radius:12px;
    padding:11px 16px; font-size:14px; font-weight:700; transition:.14s; min-height:44px;
  }
  .btn:hover{border-color:var(--muted); transform:translateY(-1px)}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.45; cursor:not-allowed; transform:none}
  .btn-approve{
    background:linear-gradient(135deg, #22c55e, #16a34a); border-color:transparent; color:#fff;
    font-size:15px; padding:11px 22px; box-shadow:0 6px 16px rgba(22,163,74,.30); flex-grow:1; max-width:240px;
  }
  .btn-approve:hover{background:linear-gradient(135deg, #16a34a, #128a3e); box-shadow:0 8px 20px rgba(22,163,74,.38)}
  .btn-reject{
    background:#fff; color:var(--err-ink); border-color:#ffd2d6; font-size:15px; padding:11px 22px;
  }
  .btn-reject:hover{background:var(--err-soft); border-color:var(--err)}
  .btn-cond{color:var(--ok-ink); border-color:var(--ok-soft); background:#fff; font-size:13px; min-height:40px; padding:9px 13px}
  .btn-cond:hover{background:var(--ok-soft); border-color:var(--ok)}
  .btn-defer{color:var(--muted); font-size:13px; min-height:40px; padding:9px 13px}
  .comment{
    flex-basis:100%; border:1.5px solid var(--border); border-radius:12px; padding:11px 13px;
    font-family:inherit; font-size:14px; resize:none; min-height:42px; color:var(--ink); background:#fff;
    transition:.14s;
  }
  .comment::placeholder{color:var(--faint)}
  .comment:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  /* success celebration overlay injected on approve */
  .success-pop{
    position:absolute; left:50%; top:50%; z-index:5; pointer-events:none;
    width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg, #22c55e, #16a34a);
    color:#fff; font-size:38px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px rgba(22,163,74,.4); animation:successPop .85s ease forwards;
  }
  .spark{
    position:fixed; z-index:200; width:11px; height:11px; border-radius:3px; pointer-events:none;
    animation:sparkFly .7s cubic-bezier(.2,.7,.3,1) forwards;
  }

  /* ---------- Team: scorecards ---------- */
  .scorecard{
    background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:16px; box-shadow:var(--shadow);
    transition:box-shadow .2s, transform .2s; animation:cardIn .4s cubic-bezier(.2,.7,.3,1) both;
  }
  .scorecard:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px)}
  .sc-head{display:flex; align-items:center; gap:13px; flex-wrap:wrap}
  .sc-emoji{
    width:52px; height:52px; border-radius:15px; display:flex; align-items:center; justify-content:center;
    font-size:27px; flex-shrink:0; box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.6);
  }
  .sc-title{flex:1; min-width:160px}
  .sc-title .name{font-size:18px; font-weight:800; line-height:1.2; letter-spacing:-.01em}
  .sc-title .role{font-size:13.5px; color:var(--muted); font-weight:600}
  .status{
    display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700;
    padding:6px 13px; border-radius:999px; white-space:nowrap;
  }
  .status .dot{width:9px; height:9px; border-radius:50%}
  .status.live{background:var(--ok-soft); color:var(--ok-ink)}
  .status.live .dot{background:var(--ok-bright); animation:ring 2s infinite}
  .status.idle{background:var(--accent-soft); color:var(--accent-ink)}
  .status.idle .dot{background:var(--accent)}
  .status.quiet{background:var(--warn-soft); color:var(--warn-ink)}
  .status.quiet .dot{background:var(--warn)}
  .status.silent{background:var(--err-soft); color:var(--err-ink)}
  .status.silent .dot{background:var(--err)}
  .sc-what{font-size:14px; color:var(--muted); margin:13px 0 15px; line-height:1.55}
  .sc-metrics{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px;
  }
  .metric{background:#f6f9fe; border:1.5px solid var(--border-soft); border-radius:13px; padding:13px 12px; text-align:center}
  .metric .v{font-size:24px; font-weight:800; line-height:1.1; color:var(--ink)}
  .metric .v.warn{color:var(--warn-ink)} .metric .v.err{color:var(--err-ink)} .metric .v.ok{color:var(--ok-ink)}
  .metric .k{font-size:11.5px; color:var(--muted); margin-top:4px; font-weight:600}
  .sc-latest{
    border-top:2px dashed var(--border-soft); padding-top:14px; font-size:13.5px;
  }
  .sc-latest .ll{font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:var(--accent-ink); margin-bottom:6px}
  .sc-latest .subj{font-weight:700; margin-bottom:9px; line-height:1.4}
  .sc-latest .when{color:var(--faint); font-weight:500; font-size:12.5px}

  .infra-note, .paused-box{
    background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); margin-bottom:16px;
  }
  .infra-grid{display:grid; grid-template-columns:1fr 1fr; gap:1.5px; background:var(--border-soft); border-radius:var(--radius); overflow:hidden}
  .infra-cell{background:var(--card); padding:16px 18px; display:flex; gap:13px; align-items:flex-start}
  .infra-cell .ie{font-size:26px}
  .infra-cell .nm{font-weight:800; font-size:15px}
  .infra-cell .rl{font-size:12.5px; color:var(--muted); font-weight:600}
  .infra-cell .mt{font-size:12.5px; color:var(--faint); margin-top:5px; line-height:1.5}
  details.paused-box{padding:0}
  details.paused-box summary{
    list-style:none; padding:15px 20px; font-size:14px; font-weight:700; color:var(--muted);
    cursor:pointer; display:flex; align-items:center; gap:9px;
  }
  details.paused-box summary:hover{color:var(--ink)}
  details.paused-box summary::-webkit-details-marker{display:none}
  details.paused-box summary .chev{transition:.16s; color:var(--accent)}
  details.paused-box[open] summary .chev{transform:rotate(90deg)}
  .paused-list{padding:0 20px 18px; display:grid; grid-template-columns:1fr 1fr; gap:8px 20px}
  .paused-item{font-size:13px; color:var(--muted); display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1.5px solid var(--border-soft); font-weight:600}
  .paused-item .why{color:var(--faint); font-size:12px; white-space:nowrap; font-weight:500}

  /* ---------- Trends ---------- */
  .stat-strip{
    display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;
  }
  .stat-tile{
    background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden;
    transition:box-shadow .2s, transform .2s; animation:fadeIn .4s ease both;  /* opacity-only: transform-scale entrance blurs canvas/text on fractional-DPR (125/150%) displays */
  }
  .stat-tile::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--accent)}
  .stat-tile.t-ok::before{background:var(--ok-bright)} .stat-tile.t-warn::before{background:var(--warn)} .stat-tile.t-purple::before{background:#8b5cf6}
  .stat-tile:hover{box-shadow:var(--shadow-hover); transform:translateY(-2px)}
  .stat-tile .v{font-size:32px; font-weight:800; line-height:1; letter-spacing:-.02em}
  .stat-tile .k{font-size:13px; color:var(--muted); margin-top:7px; font-weight:600}
  .chart-card{
    background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius);
    padding:18px 20px 20px; box-shadow:var(--shadow); margin-bottom:18px;
    animation:fadeIn .45s ease both;  /* opacity-only so the chart <canvas> never gets composited+scaled (blur fix) */
  }
  .chart-card h3{font-size:16px; margin:0 0 4px; font-weight:800; letter-spacing:-.01em}
  .chart-card .sub{font-size:13px; color:var(--muted); margin:0 0 16px; line-height:1.5}
  .chart-wrap{position:relative; height:240px}
  .chart-wrap.short{height:190px}

  /* ---------- States ---------- */
  .loading,.empty{
    text-align:center; padding:56px 20px; color:var(--muted); font-size:15px;
  }
  .empty .big{font-size:44px; display:block; margin-bottom:14px}
  .empty.celebrate{color:var(--ok-ink); font-size:18px; font-weight:700}
  .empty.celebrate .big{
    width:96px; height:96px; margin:0 auto 18px; border-radius:50%;
    background:linear-gradient(135deg, #22c55e, #16a34a); color:#fff; font-size:52px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 14px 36px rgba(22,163,74,.4);
    animation:popIn .6s cubic-bezier(.2,.7,.3,1) both, floaty 3.2s ease-in-out 1s infinite;
  }
  .empty.celebrate .sub{font-size:14.5px; color:var(--muted); font-weight:500; margin-top:8px}
  .inline-err{
    background:var(--card); border:2px dashed #ffcdd2; border-radius:var(--radius);
    padding:22px; text-align:center; color:var(--muted); font-size:14px; margin-bottom:16px;
  }
  .inline-err button{
    background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:8px 16px;
    font-size:13px; font-weight:700; color:var(--accent-ink); margin-top:10px; transition:.14s;
  }

<script>
/* =====================================================================
   Liftnow Agents — Command Center
   Static dashboard. Calls n8n webhooks directly from the browser.
   Built ground-truth-first: it shows ONLY the agents that actually run,
   and every "done" claim links to proof you can open and verify.
   ===================================================================== */

const API_BASE = 'https://agents.liftnowdirect.com/webhook';
const AGENT_SECRET = 'LiftnowAgentTeam_kS9-bGq2_xVtN4mP';  // shared with n8n auth guard
const HUBSPOT_PORTAL = '24043196';

// --- The 4 agents that are actually ACTIVE in n8n (verified live) ---
// ticketAgent = the `agent` field on their HubSpot tickets
// hbId        = the agentId on their heartbeats
const AGENTS = [
  { key:'bee',    emoji:'🐝', name:'Bee',    role:'SEO Optimizer',          ticketAgent:'SEO Optimizer',          hbId:'sam',   color:'#d97706', tint:'rgba(217,119,6,.12)',
    what:'Scans liftnow.com pages for ranking slippage and drafts on-page SEO fixes for your review.' },
  { key:'turtle', emoji:'🐢', name:'Turtle', role:'Content Decay Detector', ticketAgent:'Content Decay Detector', hbId:'dax',   color:'#16a34a', tint:'rgba(22,163,74,.12)',
    what:'Watches for pages losing search traffic and proposes content refreshes before they slide further.' },
  { key:'eagle',  emoji:'🦅', name:'Eagle',  role:'UI/UX Performance',      ticketAgent:'UI/UX Performance',      hbId:'uma',   color:'#0d9488', tint:'rgba(13,148,136,.12)',
    what:'Audits /resources/ pages for structural and UX defects, then bundles the fixes that need a look.' },
  { key:'owl',    emoji:'🦉', name:'Owl',    role:'Content Producer',       ticketAgent:'Content Producer',       hbId:'carla', color:'#0366d6', tint:'rgba(3,102,214,.12)',
    what:'Drafts brand-new articles and content pieces for liftnow.com, ready for you to approve.' },

const AGENT_BY_TICKET = Object.fromEntries(AGENTS.map(a => [a.ticketAgent, a]));
const AGENT_BY_HB = Object.fromEntries(AGENTS.map(a => [a.hbId, a]));
const MARKETING_TICKET_AGENTS = new Set(AGENTS.map(a => a.ticketAgent));

// --- Infra agents that keep the team running (not content producers) ---
const INFRA = [
  { emoji:'🦫', name:'Beaver', role:'Approval Executor',  hbId:'forge',    what:'Applies your approved decisions and powers the heartbeat that proves the team is alive.' },
  { emoji:'🐺', name:'Wolf',   role:'Failure Alerts',     hbId:'sentinel', what:'Watches every agent and raises a flag the moment one goes silent or starts erroring.' },
];

// --- Agents intentionally OFF, with honest one-line reasons ---
const PAUSED = [
  ['SEM Manager',            'needs ad-spend approval'],
  ['SEM Auto-Optimizer',     'needs ad-spend approval'],
  ['Backlink Builder',       'needs email-send approval'],
  ['LinkedIn Cadence',       'not enabled yet'],
  ['Keyword Discovery',      'not enabled yet'],
  ['Community Engagement',   'not enabled yet'],
  ['Competitor SERP Monitor','not enabled yet'],
  ['Brand Listening',        'not enabled yet'],
  ['Coordinator / Team Mgr', 'not enabled yet'],
  ['Ticket Triage',          'not enabled yet'],
  ['Daily ROI Tracker',      'not enabled yet'],
  ['Asset Review Gate',      'runs only on demand'],
];

const STAGE_LABEL = {'1':'Needs review','2':'Approved','3':'Deferred','4':'Closed / rejected','1363043699':'Auto-applied'};

let currentView = 'now';
const STATE = { all:null, allErr:false, pending:null, pendErr:false, hb:null, hbErr:false, fb:null, updatedAt:null };

// Design/QA mode. Add ?static=1 to the URL to load data once and then STOP the
// auto-refresh poller, so the page reaches network-idle and can be screenshotted
// and iterated on. Persisted to localStorage ONLY on localhost (so a stray
// ?static link can never freeze the live dashboard for a real user). ?live clears it.
let STATIC_MODE = false;
try {
  const isLocal = /^(localhost|127\.0\.0\.1|\[::1\])/.test(location.hostname);
  if (location.search.indexOf('live') !== -1) { localStorage.removeItem('dashStatic'); }
  if (location.search.indexOf('static') !== -1) { STATIC_MODE = true; if (isLocal) localStorage.setItem('dashStatic','1'); }
  else if (isLocal && localStorage.getItem('dashStatic') === '1') { STATIC_MODE = true; }
} catch(e) { STATIC_MODE = location.search.indexOf('static') !== -1; }
let charts = [];
let focusedTicketId = null;

/* ---------------------------------------------------------------------
   Helpers (escapeHtml / toast / age / proof links)  — proven, preserved
   ------------------------------------------------------------------- */
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// Some ticket text arrives HTML-encoded from HubSpot (e.g. "Costs, &amp; Best Uses").
// Decode once to clean text so the later escapeHtml() single-encodes it (no "&amp;amp;").
// Safe: textarea content is RCDATA — no scripts run.
function decodeEntities(s){
  if (s == null) return s;
  const ta = document.createElement('textarea');
  ta.innerHTML = String(s);
  return ta.value;
}

function toast(msg, kind='ok'){
  const t = document.createElement('div');
  t.className = 'toast ' + kind;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)}, 2600);
}

function ageLabel(hours){
  hours = Number(hours)||0;
  if (hours < 1) return 'just now';
  if (hours < 24) return `${Math.round(hours)}h ago`;
  return `${Math.floor(hours/24)}d ago`;
}
function ageClass(hours){ return (Number(hours)||0) > 36 ? 'old' : ''; }
function plural(n, word){ return Number(n) === 1 ? word : word + 's'; }

function hubspotLink(ticketId){ return `https://app.hubspot.com/contacts/${HUBSPOT_PORTAL}/record/0-5/${ticketId}`; }
function pageUrlFromTicket(t){
  try { const d = JSON.parse(t.recommendationDetail || '{}'); return d.url || d.target_url || d.page_url || null; }
  catch { return null; }
}

// Robust page reference: checks recommendationDetail JSON, then any URL embedded in the
// outcome notes / subject, then a WordPress page id. Returns {url,label,key} or null.
// `key` is a normalized identity so two tickets aimed at the SAME page group together.
function pageRefFromTicket(t){
  const normUrl = (u) => {
    try { return String(u).trim().replace(/^https?:\/\//i,'').replace(/^www\./i,'').split(/[?#]/)[0].replace(/\/+$/,'').toLowerCase(); }
    catch(e){ return ''; }
  };
  let url = pageUrlFromTicket(t);
  if (!url){
    const hay = `${t.outcomeNotes||''} ${t.subject||''} ${String(t.recommendationDetail||'')}`;
    const m = hay.match(/https?:\/\/[^\s)"'<>]+/i);
    if (m) url = m[0].replace(/[.,;]+$/,'');
  }
  if (url){
    const k = normUrl(url);
    if (k) return { url, key:'u:'+k, label: k.replace(/^liftnow\.com\/?/,'') || k };
  }
  try {
    const d = JSON.parse(t.recommendationDetail || '{}');
    const wp = d.wpId || d.wp_page_id || d.page_id;
    if (wp) return { url:null, key:'wp:'+wp, label:`WP page ${wp}` };
  } catch(e){}
  return null;
}

// Group tickets by target page → { key: [{id,label},...] } for any page with 2+ tickets.
function dupePageMap(tickets){
  const byKey = {};
  for (const t of (tickets||[])){
    const ref = pageRefFromTicket(t);
    if (!ref) continue;
    (byKey[ref.key] = byKey[ref.key] || []).push({ id:t.ticketId, label:ref.label });
  }
  const dupes = {};
  for (const k in byKey){ if (byKey[k].length >= 2) dupes[k] = byKey[k]; }
  return dupes;
}

// Classify a decided ticket's outcome for the History view. Returns null if unrecognizable.
function classifyDecision(t){
  const notes = String(t.outcomeNotes || '').trim();
  if (String(t.stage) === '1363043699'){
    return { kind:'done', label:'Done by the team', cls:'ok', detail: notes };  // executor applied it
  }
  const m = notes.match(/^(CONDITIONAL_APPROVE|APPROVED_VIA_CONDITION|APPROVED|REJECTED|HOLDBACK|ACK(?:NOWLEDGED)?)\b\s*(\d{4}-\d\d-\d\dT[\d:.]+Z)?([\s\S]*)$/i);
  if (!m) return null;
  const token = m[1].toUpperCase();
  const when  = m[2] || '';
  const detail = (m[3] || '').replace(/^[\s—–‒:\-•·|>�]+/, '').trim();
  if (token === 'CONDITIONAL_APPROVE' || token === 'APPROVED_VIA_CONDITION') return { kind:'cond',    label:'Approved with a note', cls:'ok',    detail, when };
  if (token === 'APPROVED')               return { kind:'approve', label:'Approved',             cls:'ok',    detail, when };
  if (token === 'REJECTED')               return { kind:'reject',  label:'Rejected',             cls:'err',   detail, when };
  if (token === 'HOLDBACK')               return { kind:'hold',    label:'Held for review',      cls:'warn',  detail, when };
  return { kind:'ack', label:'Acknowledged', cls:'muted', detail, when };
}

// Infra/test/auto-retry noise that should NOT show in the human decision history.
function isHistoryNoise(t){
  const subj = String(t.subject || '');
  const notes = String(t.outcomeNotes || '');
  // Raw infra prefixes (some tickets arrive un-humanized).
  if (/^\s*(Heads-up:|Escalated:|\[SILENT FAILURE\]|\[TEST-)/i.test(subj)) return true;
  // humanizeSubject() runs before tickets reach STATE.all and REWRITES infra subjects:
  // "[SILENT FAILURE] X fired N×/24h, 0 tickets" -> "X fires constantly but produced 0
  // tickets in last 24h". Catch that humanized form so health alerts stay out of History.
  if (/fires constantly but produced 0 tickets/i.test(subj)) return true;
  if (/^\s*(WOLF_|RESOLVED\b.*\(operator\)|\[TEST-)/i.test(notes)) return true;
  return false;
}

// Friendly relative time for a history row (falls back to a short date).
function histWhen(iso){
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const ms = Date.now() - d.getTime();
  if (ms < 36e5) return 'just now';
  if (ms < 864e5) return `${Math.round(ms/36e5)}h ago`;
  const days = Math.floor(ms/864e5);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString([], {month:'short', day:'numeric'});
}

function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,200)+'px'; }

// Respect reduced-motion everywhere the JS animates.
function reduceMotion(){ try { return matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(e){ return false; } }

// Animate a number from 0 up to its data-count value (ease-out). No-op if reduced motion.
function countUp(el){
  if (!el) return;
  const target = Number(el.dataset.count);
  if (!isFinite(target) || target <= 0 || reduceMotion()){ if (isFinite(target)) el.textContent = target; return; }
  const dur = 650, t0 = performance.now();
  (function step(now){
    const p = Math.min((now - t0) / dur, 1);
    el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));
    if (p < 1) requestAnimationFrame(step);
  })(performance.now());
}

// Approval celebration: a ✓ that pops in the card + a little burst of sparks.
function celebrate(card){
  if (reduceMotion() || !card) return;
  const pop = document.createElement('div');
  pop.className = 'success-pop'; pop.textContent = '✓';
  card.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
  const r = card.getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + Math.min(r.height / 2, 90));
}
function burst(x, y){
  const colors = ['#22c55e','#2f6bff','#f59e0b','#ec4899','#8b5cf6','#16a34a'];
  for (let i = 0; i < 16; i++){
    const s = document.createElement('span');
    s.className = 'spark';
    const ang = (Math.PI * 2 * i) / 16 + Math.random() * 0.5;
    const dist = 55 + Math.random() * 75;
    s.style.left = x + 'px'; s.style.top = y + 'px';
    s.style.background = colors[i % colors.length];
    s.style.setProperty('--dx', (Math.cos(ang) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dy', (Math.sin(ang) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dr', (Math.random() * 360 | 0) + 'deg');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 760);
  }
}

// Status from how recently the agent last fired a heartbeat.
function statusFromHours(h){
  if (h == null) return {k:'silent', label:'no signal'};
  if (h < 1)  return {k:'live',   label:'live'};
  if (h < 12) return {k:'idle',   label:'idle'};
  if (h < 48) return {k:'quiet',  label:'quiet'};
  return {k:'silent', label:'silent'};
}

/* ---------------------------------------------------------------------
   Subject humanizer + ticket-content parser  — preserved verbatim
   ------------------------------------------------------------------- */
function humanizeSubject(subj){
  if (!subj) return subj;
  let s = decodeEntities(String(subj));
  s = s.replace(/^\[SERP\s+top_3_entry\]\s*([^\s]+)\s+on\s+"([^"]+)"\s+—\s+(.+?)\s*→\s*(\d+)/i,
    (_, dom, kw) => `Competitor moved into top 3 for "${kw}" — ${dom.replace(/\.com$/,'').replace(/-/g,' ')}`);
  s = s.replace(/^\[SERP\s+top_3_exit\]\s*([^\s]+)\s+on\s+"([^"]+)"\s+—\s+\d+\s*→\s*(\d+)/i,
    (_, dom, kw, cur) => `${dom.replace(/\.com$/,'').replace(/-/g,' ')} dropped out of top 3 for "${kw}" — now #${cur}`);
  s = s.replace(/^\[SERP\s+new_entrant\]\s*([^\s]+)\s+on\s+"([^"]+)"\s+—\s+new\s*→\s*(\d+)/i,
    (_, dom, kw, cur) => `New competitor for "${kw}" — ${dom.replace(/\.com$/,'').replace(/-/g,' ')} just appeared at #${cur}`);
  s = s.replace(/^\[SERP\s+position_jump\]\s*([^\s]+)\s+on\s+"([^"]+)"\s+—\s+(\d+)\s*→\s*(\d+)/i, (_, dom, kw, prev, cur) => {
    const dir = parseInt(cur) < parseInt(prev) ? 'up' : 'down';
    return `${dom.replace(/\.com$/,'').replace(/-/g,' ')} moved ${Math.abs(prev - cur)} spots ${dir} for "${kw}" — now #${cur}`;
  });
  s = s.replace(/^\[GOOGLE_NEWS\]\s*/i, 'News mention: ');
  s = s.replace(/^\[HN\]\s*/i, 'HN discussion: ');
  s = s.replace(/^\[Reddit Engagement\]\s*r\/([^\s:]+):\s*(.+)$/i, (_, sub, title) => `Reddit reply draft — r/${sub}: ${title}`);
  s = s.replace(/^\[ESCALATED\]\s*n8n Agent Failed:\s*(.+)$/i, (_, name) => `Escalated: ${name.replace(/[\s—-]+$/, '').trim()} failed repeatedly`);
  s = s.replace(/^n8n Agent Failed:\s*(.+)$/i, (_, name) => `Heads-up: ${name.replace(/[\s—-]+$/, '').trim()} hit an error`);
  s = s.replace(/^\[TRIAGE\]\s*Today's top (\d+)\s*-\s*(.+)$/i, (_, n, date) => `Today's top ${n} items to look at — ${date}`);
  s = s.replace(/^\[META\]\s*Weekly Team Review\s*-\s*(.+?)\s*-\s*(\d+)\s+failures,\s*(\d+)\s+opportunities$/i,
    (_, date, fails, opps) => `Weekly team review (${date}) — ${fails} agents struggled, ${opps} new opportunities`);
  s = s.replace(/^\[PATTERNS\]\s*Weekly review\s*-\s*(.+?)\s*\((no patterns|.+? themes?)\)$/i, (_, date, themes) => {
    if (/^no patterns$/i.test(themes)) return `Weekly patterns from your decisions (${date}) — no themes this week`;
    return `Weekly patterns from your decisions (${date}) — ${themes} worth seeing`;
  });
  s = s.replace(/^\[BRIEFING\]\s*Daily\s*—\s*(.+?)\s*\((\d+)\s+items\)$/i, (_, date, n) => `Today's morning briefing — ${date} (${n} items)`);
  s = s.replace(/^\[BEE\]\s*Daily baseline report\s*—\s*(\d+)\s+pages still collecting data$/i, (_, n) => `Bee baseline check-in — ${n} pages still gathering search data`);
  s = s.replace(/^\[COORDINATOR\]\s*Weekly Summary\s*-\s*(.+)$/i, (_, date) => `Weekly summary — ${date}`);
  s = s.replace(/^\[SILENT FAILURE\]\s*(.+?)\s+fired\s+\d+× \/ 24h,\s*0 HubSpot tickets$/i, (_, name) => `${name} fires constantly but produced 0 tickets in last 24h`);
  s = s.replace(/^\[done\]\s*Drafted:\s*/i, 'Article draft ready — ');
  s = s.replace(/^\[done\]\s*Posted on LinkedIn:\s*/i, 'LinkedIn post draft ready — ');
  s = s.replace(/^\[done\]\s*SEM Auto:\s*/i, 'Google Ads: budget ');
  s = s.replace(/^\[suggestion\]\s*/i, 'Google Ads suggestion — ');
  s = s.replace(/^\[review\]\s*SEM:\s*/i, 'Google Ads change needs your approval: ');
  s = s.replace(/^\[[A-Z][A-Z_]+\]\s*/, '');
  s = s.replace(/^Content decay:\s*https?:\/\/[^/]+\/(.+?)\/?\s*—\s*(-?\d+(?:\.\d+)?)%\s*clicks,\s*(-?\d+(?:\.\d+)?)\s*positions?$/i,
    (_, path, clicks, pos) => {
      const slug = path.split('/').filter(Boolean).pop() || path;
      return `Refresh "${slug}" — losing traffic (${clicks}% clicks, ${pos} spots)`;
    });
  return s;
}

function renderTicketContent(content){
  const raw = decodeEntities(String(content || ''));
  if (!raw.trim()) return '<div style="color:var(--faint)">(no detail)</div>';
  const hasAsk = /(^|\n)ASK\s*\n/.test(raw);
  const hasWhy = /(^|\n)WHY\s*\n/.test(raw);
  const hasApprove = /(^|\n)IF YOU APPROVE\s*\n/.test(raw);
  if (!(hasAsk && hasWhy && hasApprove)) return `<div class="section-body">${escapeHtml(raw)}</div>`;
  const re = /(^|\n)(ASK|WHY|IF YOU APPROVE|IF YOU REJECT)\s*\n/g;
  const sections = {}; const matches = []; let m;
  while ((m = re.exec(raw)) !== null) matches.push({label: m[2], headerStart: m.index, bodyStart: m.index + m[0].length});
  for (let i = 0; i < matches.length; i++) {
    const end = i + 1 < matches.length ? matches[i+1].headerStart : raw.length;
    sections[matches[i].label] = raw.slice(matches[i].bodyStart, end).replace(/\s+$/, '');
  }
  let html = '';
  if (sections['ASK'])           html += `<div class="section"><div class="section-label">What it's asking</div><div class="section-body">${escapeHtml(sections['ASK'])}</div></div>`;
  if (sections['WHY']){
    // The WHY span often swallows the agent's full draft (--- TITLE ---, BODY:, WP EDIT URL …).
    // Keep the rationale prose inline; tuck the raw draft into a collapsed disclosure.
    const { prose, draft } = splitDraft(sections['WHY']);
    if (prose)  html += `<div class="section"><div class="section-label">Why</div><div class="section-body">${escapeHtml(prose)}</div></div>`;
    if (draft)  html += `<details class="draft"><summary>View the full drafted content</summary><pre>${escapeHtml(draft)}</pre></details>`;
  }
  if (sections['IF YOU APPROVE'])html += `<div class="section-approve"><div class="section-label">If you approve</div><div class="section-body">${escapeHtml(sections['IF YOU APPROVE'])}</div></div>`;
  if (sections['IF YOU REJECT']) html += `<div class="section-reject"><div class="section-label">If you reject</div><div class="section-body">${escapeHtml(sections['IF YOU REJECT'])}</div></div>`;
  return html;
}

// Separate WHY rationale (prose) from a drafted-content block. The draft starts at the
// first "--- SECTION ---" divider, a "BODY:" line, or an edit-URL line — whichever comes first.
function splitDraft(text){
  const lines = String(text).split('\n');
  let cut = -1;
  for (let i = 0; i < lines.length; i++){
    const s = lines[i].trim();
    if (/^-{2,}.*-{2,}$/.test(s) || /^BODY:?$/i.test(s) || /^(WP|MY)\s+EDIT\s+URL/i.test(s)){ cut = i; break; }
  }
  if (cut === -1) return { prose: text.replace(/\s+$/, ''), draft: '' };
  return {
    prose: lines.slice(0, cut).join('\n').replace(/\s+$/, ''),
    draft: lines.slice(cut).join('\n').replace(/^\s+|\s+$/g, ''),
  };
}

// One- to two-line plain-text gist of a ticket, for the collapsed card.
// Prefers the ASK block; falls back to the first meaningful line.
function askPreview(content){
  const raw = decodeEntities(String(content || '')).trim();
  if (!raw) return '';
  let text;
  const m = /(^|\n)ASK\s*\n([\s\S]*?)(?:\n(?:WHY|BODY|IF YOU APPROVE|IF YOU REJECT)\s*\n|$)/.exec(raw);
  if (m) text = m[2];
  else text = raw.replace(/^(ASK|WHY|BODY|IF YOU (APPROVE|REJECT))\s*\n/i, '');
  text = text.replace(/\s+/g, ' ').trim();
  return text.length > 165 ? text.slice(0, 162).replace(/\s+\S*$/, '') + '…' : text;
}

/* ---------------------------------------------------------------------
   Data layer — every source loads independently (no all-or-nothing)
   ------------------------------------------------------------------- */
async function fetchTickets(view, signal){
  const r = await fetch(`${API_BASE}/agent-proposals?view=${view}`, signal ? { signal } : undefined);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  // Hide non-marketing infra tickets that can leak in (kill switch, webhooks, SFD, etc.)
  const NON_MARKETING_PATTERNS = [
    /quote\s*watcher/i, /phase\s*5/i, /cf7\s*form/i, /duplicate\s*workflow/i,
    /master\s*kill\s*switch/i, /daily\s*health\s*check/i,
    /webhook[:\s].*decision\s*memory/i, /webhook[:\s].*agent\s*proposals/i, /webhook[:\s].*process\s*decision/i,
    /silent\s*failure\s*detector/i, /agent\s*heartbeat\s*store/i, /agent\s*feedback\s*store/i,
    /^\[UI\/UX\]\s+0\s+defects\s+on\s+\?$/i,
  ];
  const isNonMarketing = (t) => {
    const hay = [(t.subject||''),(t.outcomeNotes||''),(t.content||'').slice(0,500)].join(' ');
    return NON_MARKETING_PATTERNS.some((re) => re.test(hay));
  };
  if (Array.isArray(data?.tickets)) {
    data.tickets = data.tickets.filter((t) => !isNonMarketing(t)).map((t) => ({...t, subject: humanizeSubject(t.subject)}));
  }
  return data;
}

async function boot(silent){
  const btn = document.getElementById('refresh-btn');
  if (btn){ btn.disabled = true; btn.textContent = '…'; }
  if (!silent && !STATE.updatedAt) document.getElementById('main').innerHTML = skeleton();

  const settle = (p) => p.then(v => ({ok:true, v})).catch(e => ({ok:false, e}));
  // Cap every source at 8s and actually ABORT the request — a hung webhook must
  // not keep the page spinning (and must not block network-idle for screenshots).
  const ctrl = new AbortController();
  const capId = setTimeout(() => ctrl.abort(), 8000);
  const [allR, pendR, hbR, fbR] = await Promise.all([
    settle(fetchTickets('all', ctrl.signal)),
    settle(fetchTickets('pending', ctrl.signal)),
    settle(fetch(`${API_BASE}/agent-heartbeat?action=read&limit=300`, { signal: ctrl.signal }).then(r => r.ok ? r.json() : Promise.reject(r.status))),
    settle(fetch(`${API_BASE}/agent-feedback?action=read`, { signal: ctrl.signal }).then(r => r.ok ? r.json() : Promise.reject(r.status))),
  ]);
  clearTimeout(capId);

  STATE.all = allR.ok ? (allR.v.tickets || []) : null;  STATE.allErr = !allR.ok;
  STATE.pending = pendR.ok ? (pendR.v.tickets || []) : null;  STATE.pendErr = !pendR.ok;
  STATE.hb = hbR.ok ? hbR.v : null;  STATE.hbErr = !hbR.ok;
  STATE.fb = fbR.ok ? fbR.v : null;
  STATE.updatedAt = new Date();

  if (btn){ btn.disabled = false; btn.textContent = 'Refresh'; }
  renderHeader();
  renderCurrent();
  renderFooter();
}

function ticketsFor(agent){ return (STATE.all || []).filter(t => (t.agent || '') === agent.ticketAgent); }
function pendingFor(agent){ return (STATE.pending || []).filter(t => (t.agent || '') === agent.ticketAgent); }

function hbStats(hbId){
  const s = STATE.hb?.stats_24h?.[hbId];
  return { total: s?.total ?? 0, errored: s?.errored ?? 0 };
}
function lastSeenHours(hbId){
  const beats = (STATE.hb?.heartbeats || []).filter(h => (h.agentId||'') === hbId && h.at);
  if (!beats.length) return null;
  const latest = beats.reduce((a,b) => (a.at > b.at ? a : b)).at;
  const ms = Date.now() - new Date(latest).getTime();
  return ms >= 0 ? ms / 36e5 : 0;
}
function stageCounts(tickets){
  const c = {};
  for (const t of tickets) c[String(t.stage)] = (c[String(t.stage)]||0) + 1;
  return c;
}

/* =====================================================================
   TAB 1 — NOW   ·   "What needs me?"
   ===================================================================== */
function renderNow(){
  const main = document.getElementById('main');
  if (STATE.pendErr || STATE.pending == null){
    main.innerHTML = `<div class="section-head"><h2>What needs you</h2></div>` + inlineErr("Couldn't reach the approval queue.");
    return;
  }
  const pending = STATE.pending.slice();
  if (!pending.length){
    main.innerHTML = `<div class="section-head"><h2>What your team needs from you</h2></div>
      <div class="empty celebrate"><span class="big">✓</span>You're all caught up!
        <div class="sub">Your agents are still working in the background. The moment something needs your yes or no, it'll appear right here.</div>
      </div>`;
    return;
  }

  // Sort: HIGH before MEDIUM/LOW, then oldest first (staleness floats up).
  const rank = p => p === 'HIGH' ? 0 : p === 'MEDIUM' ? 1 : 2;
  pending.sort((a,b) => rank(a.priority) - rank(b.priority) || (b.ageHours||0) - (a.ageHours||0));
  const hi = pending.filter(t => t.priority === 'HIGH').length;
  const med = pending.filter(t => t.priority === 'MEDIUM').length;
  const low = pending.length - hi - med;

  let html = `<div class="section-head"><h2>What your team needs from you</h2></div>`;
  html += `<p class="lead">Your agents drafted these and are waiting on you. Tap any card to see what it is, then choose
      <b style="color:var(--ok-ink)">Approve</b> to let it happen or <b style="color:var(--err-ink)">Reject</b> to skip it. Quick and simple.</p>`;
  html += `<div class="queue-summary">
      <div class="stat"><span class="num" data-count="${pending.length}">${pending.length}</span><span class="lbl">${pending.length===1?'thing':'things'} waiting for you</span></div>
      <div class="pill-grp">
        ${hi  ? `<span class="prio HIGH">${hi} important</span>` : ''}
        ${med ? `<span class="prio MEDIUM">${med} medium</span>` : ''}
        ${low ? `<span class="prio LOW">${low} low</span>` : ''}
      </div>
    </div>`;

  // #165 — duplicate-page guard: warn when 2+ pending tickets point at the same page.
  const dupes = dupePageMap(pending);
  const dupKeys = Object.keys(dupes);
  if (dupKeys.length){
    const totalDup = dupKeys.reduce((nn,k) => nn + dupes[k].length, 0);
    html += `<div class="dup-banner">⚠ <b>Heads up:</b> ${totalDup} of these point at the same ${dupKeys.length===1?'page':'pages'}.
      Approving more than one may apply duplicate changes to the same page — open them and check before you approve.</div>`;
  }

  const GROUP = {
    'HIGH':   ['🔥', 'Look at these first'],
    'MEDIUM': ['👀', 'Worth a look'],
    'LOW':    ['🌱', 'Whenever you have a moment'],
  };
  let lastBucket = null, i = 0;
  for (const t of pending){
    const p = (t.priority || 'LOW').toUpperCase();
    const key = (p === 'HIGH' || p === 'MEDIUM') ? p : 'LOW';
    if (key !== lastBucket){
      const [em, lbl] = GROUP[key];
      html += `<div class="group-label"><span class="gl-emoji">${em}</span>${lbl}</div>`;
      lastBucket = key;
    }
    html += actionCard(t, i++, dupes);
  }
  main.innerHTML = html;
  main.querySelectorAll('[data-count]').forEach(countUp);
}

function actionCard(t, i, dupes){
  const id = t.ticketId;
  const agent = AGENT_BY_TICKET[t.agent];
  const chip = agent
    ? `<span class="agent-chip" style="background:${agent.tint}; color:${agent.color}"><span class="emoji">${agent.emoji}</span>${agent.name}</span>`
    : `<span class="agent-chip" style="background:#eef1f4; color:var(--muted)">${escapeHtml(t.agent||'Agent')}</span>`;
  const prio = (t.priority || 'LOW').toUpperCase();
  const prioLabel = prio === 'HIGH' ? 'Important' : (prio === 'MEDIUM' ? 'Medium' : 'Low');
  const url = pageUrlFromTicket(t);
  const cls = prio === 'HIGH' ? 'hi' : (prio === 'MEDIUM' ? 'med' : '');
  const delay = `animation-delay:${Math.min((i||0)*55, 330)}ms`;

  const proof = `<div class="proof-row">
      <a class="proof" href="${hubspotLink(id)}" target="_blank" rel="noopener">Open ticket in HubSpot <span class="ext">↗</span></a>
      ${url ? `<a class="proof" href="${escapeHtml(url)}" target="_blank" rel="noopener">View the live page <span class="ext">↗</span></a>` : ''}
    </div>`;

  const preview = askPreview(t.content);

  // #165 — does another pending ticket target the same page?
  const dupRef = pageRefFromTicket(t);
  const dupGroup = (dupes && dupRef && dupes[dupRef.key]) ? dupes[dupRef.key] : null;
  const others = dupGroup ? dupGroup.length - 1 : 0;
  const dupStrip = others > 0
    ? `<div class="dup-warn">⚠ ${others} other ${others===1?'request':'requests'} also target <b>${escapeHtml(dupRef.label)}</b> — you may only need one.</div>`
    : '';

  return `<div class="card collapsed ${cls}" id="card-${id}" data-ticket="${id}" style="${delay}">
    <div class="card-head" onclick="toggleCard('${id}')">
      ${chip}
      <span class="prio ${prio}">${prioLabel}</span>
      <span class="card-subject">${escapeHtml(t.subject || '(no subject)')}</span>
      <span class="card-age ${ageClass(t.ageHours)}">${ageLabel(t.ageHours)}</span>
      <span class="chev" aria-hidden="true">›</span>
    </div>
    ${dupStrip}
    ${preview ? `<div class="card-preview">${escapeHtml(preview)}</div>` : ''}
    <div class="card-detail">
      ${proof}
      <div class="card-body">${renderTicketContent(t.content)}
        ${t.outcomeNotes ? `<details><summary>Agent notes</summary><pre>${escapeHtml(t.outcomeNotes)}</pre></details>` : ''}
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-approve" onclick="decide('${id}','approve',this)">✓ Approve</button>
      <button class="btn btn-reject"  onclick="decide('${id}','reject',this)">✕ Reject</button>
      <button class="btn btn-cond"    onclick="decide('${id}','conditional_approve',this)">Approve with a note</button>
      <button class="btn btn-defer"   onclick="decide('${id}','defer',this)">Remind me later</button>
      <textarea id="comment-${id}" class="comment" placeholder="Want to leave a note? (needed to Reject or to Approve with a note) — your team learns from it." oninput="autoGrow(this)"></textarea>
    </div>
  </div>`;
}

function toggleCard(id){ const c = document.getElementById('card-'+id); if (c) c.classList.toggle('collapsed'); }

/* --- PROVEN CONTRACT: process-decision (preserved verbatim) --- */
async function decide(ticketId, decision, btn){
  const comment = document.getElementById('comment-'+ticketId)?.value || '';
  if (decision === 'conditional_approve' && !comment.trim()){ toast('Approve-with-a-note needs the condition in the note box', 'err'); return; }
  if (decision === 'reject' && !comment.trim()){ toast('Reject needs a reason in the note — the team learns from this', 'err'); return; }
  const card = document.getElementById('card-'+ticketId);
  card.querySelectorAll('button, textarea').forEach(b => b.disabled = true);
  card.style.opacity = '.55';
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);
  try {
    const r = await fetch(`${API_BASE}/process-decision`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'x-agent-secret': AGENT_SECRET},
      body: JSON.stringify({ticketId, decision, comment, deferDays: 3, secret: AGENT_SECRET}),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const MSG = {
      approve: 'Approved! ✓  Your team is on it.',
      conditional_approve: 'Approved with your note ✓',
      defer: "Okay — I'll bring this back in 3 days.",
      reject: 'Skipped. Thanks — the team learns from this.',
    };
    toast(MSG[decision] || 'Done', 'ok');
    card.style.opacity = '';
    const isApprove = decision === 'approve' || decision === 'conditional_approve';
    const finish = () => {
      card.remove();
      if (STATE.pending){ STATE.pending = STATE.pending.filter(t => t.ticketId !== ticketId); renderHeader(); }
      advanceFocus();
      if (!document.querySelector('.card[data-ticket]')) renderNow();  // empty → celebrate state
    };
    if (isApprove){
      celebrate(card);
      card.classList.add('approving');
      setTimeout(() => { card.classList.add('fading'); setTimeout(finish, 260); }, 720);
    } else {
      card.classList.add('fading');
      setTimeout(finish, 260);
    }
  } catch (e) {
    clearTimeout(timeoutId);
    toast(e.name === 'AbortError' ? 'That timed out — nothing was saved. Try again.' : 'Something went wrong: '+e.message, 'err');
    card.style.opacity = '';
    card.classList.remove('fading','approving');
    card.querySelectorAll('button, textarea').forEach(b => b.disabled = false);
  }
}

function advanceFocus(){
  const cards = Array.from(document.querySelectorAll('.card[data-ticket]'));
  if (!cards.length) return;
  cards.forEach(c => c.classList.remove('focused'));
  cards[0].classList.add('focused');
  focusedTicketId = cards[0].dataset.ticket;
  cards[0].scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* --- PROVEN CONTRACT: kill-switch (preserved verbatim body) --- */
async function triggerKillSwitch(){
  const ok = confirm('Pause all active agents?\n\nThis triggers the master kill-switch, which deactivates the running agents so they stop firing. They stay paused until you reactivate them from the n8n UI.\n\nClick OK to pause, Cancel to abort.');
  if (!ok) return;
  const btn = document.getElementById('kill-switch-btn');
  if (btn){ btn.disabled = true; btn.textContent = 'Pausing…'; }
  try {
    const r = await fetch(`${API_BASE}/kill-switch`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'x-agent-secret': AGENT_SECRET},
      body: JSON.stringify({action: 'deactivate', secret: AGENT_SECRET})
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast('All agents paused. Reactivate from the n8n UI when ready.', 'ok');
    if (btn){ btn.textContent = 'Paused'; btn.style.background = 'var(--err-soft)'; }
  } catch (e) {
    toast(`Kill switch failed: ${e.message}`, 'err');
    if (btn){ btn.disabled = false; btn.textContent = 'Pause all'; }
  }
}

/* =====================================================================
   TAB 4 — HISTORY   ·   "What happened" (your decisions + what the team applied)

function renderHistory(){
  const main = document.getElementById('main');
  if (STATE.allErr || STATE.all == null){
    main.innerHTML = `<div class="section-head"><h2>History</h2></div>` + inlineErr("Couldn't load your history right now.");

  }
  const DECIDED = new Set(['2','4','1363043699']);
  const rows = [];
  for (const t of STATE.all){
    if (!DECIDED.has(String(t.stage))) continue;
    if (isHistoryNoise(t)) continue;
    const c = classifyDecision(t);
    if (!c) continue;
    rows.push({ t, c, when: c.when || t.createdAt || '' });
  }
  rows.sort((a,b) => String(b.when).localeCompare(String(a.when)));

  let html = `<div class="section-head"><h2>History</h2></div>`;
  html += `<p class="lead">Everything your team has applied, and every call you've made — newest first. Each row links to the proof so you always have a paper trail.</p>`;

  if (!rows.length){
    main.innerHTML = html + `<div class="empty"><span class="big">📭</span>Nothing here yet.
      <div class="sub">As you approve or skip things — and as your team applies changes — they'll show up here automatically.</div></div>`;
    return;
  }

  const n = (k) => rows.filter(r => r.c.kind === k).length;
  const done = n('done'), approved = n('approve') + n('cond'), rejected = n('reject'), held = n('hold');
  html += `<div class="hist-summary">
    ${done     ? `<span class="hs-pill ok">✓ ${done} done by the team</span>` : ''}
    ${approved ? `<span class="hs-pill ok">✓ ${approved} you approved</span>` : ''}
    ${rejected ? `<span class="hs-pill err">✕ ${rejected} you skipped</span>` : ''}
    ${held     ? `<span class="hs-pill warn">⏸ ${held} held for review</span>` : ''}
  </div>`;

  html += '<div class="hist-list">';
  for (const { t, c, when } of rows){
    const agent = AGENT_BY_TICKET[t.agent];
    const chip = agent
      ? `<span class="agent-chip sm" style="background:${agent.tint}; color:${agent.color}"><span class="emoji">${agent.emoji}</span>${agent.name}</span>`
      : `<span class="agent-chip sm" style="background:#eef1f4; color:var(--muted)">${escapeHtml(t.agent||'Agent')}</span>`;
    const ref = pageRefFromTicket(t);
    const detail = c.detail ? decodeEntities(c.detail) : '';
    const note = detail ? `<div class="hist-note">${escapeHtml(detail.length > 240 ? detail.slice(0,240) + '…' : detail)}</div>` : '';
    html += `<div class="hist-row">
      <div class="hist-top">
        <span class="hist-badge ${c.cls}">${escapeHtml(c.label)}</span>
        ${chip}
        ${when ? `<span class="hist-when">${escapeHtml(histWhen(when))}</span>` : ''}
      </div>
      <div class="hist-subject">${escapeHtml(humanizeSubject(t.subject) || '(no subject)')}</div>
      ${note}
      <div class="hist-links">
        <a class="proof" href="${hubspotLink(t.ticketId)}" target="_blank" rel="noopener">Ticket <span class="ext">↗</span></a>
        ${ref && ref.url ? `<a class="proof" href="${escapeHtml(ref.url)}" target="_blank" rel="noopener">View the page <span class="ext">↗</span></a>` : ''}
      </div>
    </div>`;
  }
  html += '</div>';
  main.innerHTML = html;
}

/* =====================================================================
   TAB 2 — TEAM   ·   "How is each agent doing? (provable)"
   ===================================================================== */
function renderTeam(){
  const main = document.getElementById('main');
  let html = `<div class="section-head"><h2>Your team</h2><span class="hint">live status, what each one shipped, and proof you can open</span></div>`;

  if (STATE.allErr && STATE.hbErr){
    main.innerHTML = html + inlineErr("Couldn't reach the agent backend.");
    return;
  }

  for (const a of AGENTS) html += scorecard(a);

  // Infra
  html += `<div class="group-label">Keeping the team running</div><div class="infra-note"><div class="infra-grid">`;
  for (const i of INFRA){
    const st = statusFromHours(lastSeenHours(i.hbId));
    const s = hbStats(i.hbId);
    html += `<div class="infra-cell">
        <span class="ie">${i.emoji}</span>
        <div>
          <div class="nm">${i.name} <span class="status ${st.k}" style="font-size:11px; padding:2px 7px"><span class="dot"></span>${st.label}</span></div>
          <div class="rl">${i.role}</div>
          <div class="mt">${escapeHtml(i.what)}</div>
          <div class="mt"><b>${s.total}</b> heartbeats in last 24h${s.errored ? ` · <span style="color:var(--err)">${s.errored} error${s.errored>1?'s':''}</span>` : ' · all clean'}</div>
        </div>
      </div>`;
  }
  html += `</div></div>`;

  // Paused disclosure
  html += `<details class="paused-box">
      <summary><span class="chev">▸</span> ${PAUSED.length} agents are paused on purpose <span style="color:var(--faint); font-weight:400">— click to see which and why</span></summary>
      <div class="paused-list">
        ${PAUSED.map(([n,why]) => `<div class="paused-item"><span>${escapeHtml(n)}</span><span class="why">${escapeHtml(why)}</span></div>`).join('')}
      </div>
    </details>`;

  main.innerHTML = html;
}

function scorecard(a){
  const tickets = ticketsFor(a);
  const pending = pendingFor(a).length;
  const sc = stageCounts(tickets);
  const shipped = sc['1363043699'] || 0;       // auto-applied
  const total = tickets.length;
  const s = hbStats(a.hbId);
  const lsh = lastSeenHours(a.hbId);
  const st = statusFromHours(lsh);

  // latest ticket by createdAt
  const latest = tickets.slice().sort((x,y) => String(y.createdAt||'').localeCompare(String(x.createdAt||'')))[0];
  const url = latest ? pageUrlFromTicket(latest) : null;

  const errBit = s.errored ? `<span class="metric"><span class="v err">${s.errored}</span><span class="k">${plural(s.errored,'error')} / 24h</span></span>`
                           : `<span class="metric"><span class="v ok">0</span><span class="k">errors / 24h</span></span>`;

  let latestHtml = '';
  if (latest){
    latestHtml = `<div class="sc-latest">
        <div class="ll">Most recent</div>
        <div class="subj">${escapeHtml(latest.subject || '(no subject)')} <span class="when">· ${ageLabel(latest.ageHours)} · ${STAGE_LABEL[String(latest.stage)] || 'in pipeline'}</span></div>
        <div class="proof-row" style="padding:0">
          <a class="proof" href="${hubspotLink(latest.ticketId)}" target="_blank" rel="noopener">Open ticket in HubSpot <span class="ext">↗</span></a>
          ${url ? `<a class="proof" href="${escapeHtml(url)}" target="_blank" rel="noopener">View the live page <span class="ext">↗</span></a>` : ''}
        </div>
      </div>`;
  } else {
    latestHtml = `<div class="sc-latest"><div class="ll">Most recent</div><div style="color:var(--faint); font-size:13px">No tickets filed yet${s.total ? ` — but it fired ${s.total}× in the last 24h, so it's running.` : '.'}</div></div>`;
  }

  return `<div class="scorecard">
    <div class="sc-head">
      <div class="sc-emoji" style="background:${a.tint}">${a.emoji}</div>
      <div class="sc-title"><div class="name">${a.name}</div><div class="role">${a.role}</div></div>
      <span class="status ${st.k}"><span class="dot"></span>${st.label}${lsh!=null ? ` · ${ageLabel(lsh)}` : ''}</span>
    </div>
    <div class="sc-what">${escapeHtml(a.what)}</div>
    <div class="sc-metrics">
      <span class="metric"><span class="v">${s.total}</span><span class="k">${plural(s.total,'run')} / 24h</span></span>
      <span class="metric"><span class="v ${pending?'warn':''}">${pending}</span><span class="k">need you</span></span>
      <span class="metric"><span class="v ${shipped?'ok':''}">${shipped}</span><span class="k">auto-shipped</span></span>
      ${errBit}
    </div>
    ${latestHtml}
  </div>`;
}

/* =====================================================================
   TAB 3 — TRENDS   ·   "Is it working over time?"
   ===================================================================== */
function renderTrends(){
  const main = document.getElementById('main');
  let html = `<div class="section-head"><h2>Trends</h2><span class="hint">activity and outcomes over time — all from live data</span></div>`;

  const all = STATE.all || [];
  const totalRuns = STATE.hb?.total_24h ?? Object.values(STATE.hb?.stats_24h || {}).reduce((n,s)=>n+(s.total||0),0);
  const sc = stageCounts(all);
  const shipped = sc['1363043699'] || 0;
  const needs = STATE.pending ? STATE.pending.length : (sc['1'] || 0);
  const fbTotal = STATE.fb?.feedbackCounts ? Object.values(STATE.fb.feedbackCounts).reduce((n,v)=>n+(Number(v)||0),0) : null;

  html += `<div class="stat-strip">
      <div class="stat-tile"><div class="v" ${typeof totalRuns==='number'?`data-count="${totalRuns}"`:''}>${totalRuns ?? '—'}</div><div class="k">agent runs · 24h</div></div>
      <div class="stat-tile"><div class="v" data-count="${all.length}">${all.length}</div><div class="k">tickets on record</div></div>
      <div class="stat-tile t-ok"><div class="v" style="color:var(--ok-ink)" data-count="${shipped}">${shipped}</div><div class="k">auto-shipped</div></div>
      <div class="stat-tile t-purple"><div class="v" style="color:#7c3aed" ${typeof fbTotal==='number'?`data-count="${fbTotal}"`:''}>${fbTotal ?? '—'}</div><div class="k">your feedback given</div></div>
    </div>`;

  // chart cards (canvases filled after innerHTML set)
  html += `<div class="chart-card"><h3>Agent activity by hour</h3><p class="sub">Heartbeats logged across the last day (UTC). A steady pulse means the team is alive and working.</p>
      ${STATE.hbErr ? inlineErr("Heartbeat feed unavailable.") : `<div class="chart-wrap"><canvas id="chart-hours"></canvas></div>`}</div>`;

  html += `<div class="chart-card"><h3>Where tickets end up</h3><p class="sub">Outcome of every ticket on record. "Closed / rejected" includes internal alerts the system auto-resolves — not just your rejections.</p>
      ${STATE.allErr ? inlineErr("Ticket feed unavailable.") : `<div class="chart-wrap short"><canvas id="chart-stage"></canvas></div>`}</div>`;

  html += `<div class="chart-card"><h3>Who's producing</h3><p class="sub">Tickets filed per agent. Bee leads on volume; the others run at a steadier cadence.</p>
      ${STATE.allErr ? inlineErr("Ticket feed unavailable.") : `<div class="chart-wrap short"><canvas id="chart-agents"></canvas></div>`}</div>`;

  main.innerHTML = html;
  main.querySelectorAll('[data-count]').forEach(countUp);

  if (typeof Chart === 'undefined'){
    document.querySelectorAll('.chart-wrap').forEach(w => w.innerHTML = '<div class="empty" style="padding:30px">Charts library didn\'t load — check your connection and refresh.</div>');
    return;
  }
  Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
  Chart.defaults.color = '#656d76';

  if (!STATE.hbErr) drawHoursChart();
  if (!STATE.allErr){ drawStageChart(all); drawAgentsChart(all); }
}

function drawHoursChart(){
  const beats = STATE.hb?.heartbeats || [];
  const byHour = new Array(24).fill(0);
  for (const h of beats){ const at = h.at || ''; if (at.length >= 13){ const hr = parseInt(at.slice(11,13)); if (hr>=0 && hr<24) byHour[hr]++; } }
  const labels = byHour.map((_,i) => String(i).padStart(2,'0'));
  const ctx = document.getElementById('chart-hours'); if (!ctx) return;
  charts.push(new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data:byHour, backgroundColor:'#0366d6', borderRadius:4, maxBarThickness:20 }] },
    options:{ responsive:true, maintainAspectRatio:false, devicePixelRatio:Math.max(window.devicePixelRatio||1,2), plugins:{legend:{display:false}, tooltip:{callbacks:{title:i=>`${i[0].label}:00 UTC`, label:i=>`${i.raw} heartbeats`}}},
      scales:{ x:{grid:{display:false}, ticks:{maxRotation:0, autoSkip:true, maxTicksLimit:12}}, y:{beginAtZero:true, ticks:{precision:0}, grid:{color:'#eef1f4'}} } }
  }));
}

function drawStageChart(all){
  const sc = stageCounts(all);
  const order = [['1','Needs review','#0366d6'], ['1363043699','Auto-shipped','#1a7f37'], ['2','Approved','#16a34a'], ['3','Deferred','#9a6700'], ['4','Closed / rejected','#d0d7de']];
  const rows = order.filter(([k]) => sc[k]);
  const ctx = document.getElementById('chart-stage'); if (!ctx) return;
  charts.push(new Chart(ctx, {
    type:'doughnut',
    data:{ labels: rows.map(r=>r[1]), datasets:[{ data: rows.map(r=>sc[r[0]]), backgroundColor: rows.map(r=>r[2]), borderWidth:2, borderColor:'#fff' }] },
    options:{ responsive:true, maintainAspectRatio:false, devicePixelRatio:Math.max(window.devicePixelRatio||1,2), cutout:'62%', plugins:{ legend:{position:'right', labels:{boxWidth:12, padding:12, font:{size:12}}}, tooltip:{callbacks:{label:i=>`${i.label}: ${i.raw}`}} } }
  }));
}

function drawAgentsChart(all){
  const counts = AGENTS.map(a => ({ a, n: all.filter(t => (t.agent||'') === a.ticketAgent).length }));
  const ctx = document.getElementById('chart-agents'); if (!ctx) return;
  charts.push(new Chart(ctx, {
    type:'bar',
    data:{ labels: counts.map(c => `${c.a.emoji} ${c.a.name}`),
      datasets:[{ data: counts.map(c=>c.n), backgroundColor: counts.map(c=>c.a.color), borderRadius:5, maxBarThickness:26 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, devicePixelRatio:Math.max(window.devicePixelRatio||1,2), plugins:{legend:{display:false}, tooltip:{callbacks:{label:i=>`${i.raw} tickets filed`}}},
      scales:{ x:{beginAtZero:true, ticks:{precision:0}, grid:{color:'#eef1f4'}}, y:{grid:{display:false}} } }
  }));
}

function destroyCharts(){ charts.forEach(c => { try { c.destroy(); } catch(e){} }); charts = []; }

/* ---------------------------------------------------------------------
   Keyboard nav on the Now tab (proven shortcuts)
   ------------------------------------------------------------------- */
document.addEventListener('keydown', e => {
  if (['TEXTAREA','INPUT','SELECT'].includes(e.target.tagName)){ if (e.key === 'Escape') e.target.blur(); return; }
  if (currentView !== 'now') return;
  const cards = Array.from(document.querySelectorAll('.card[data-ticket]'));
  if (!cards.length) return;
  const focused = focusedTicketId ? cards.find(c => c.dataset.ticket === focusedTicketId) : null;
  const idx = focused ? cards.indexOf(focused) : -1;
  const setFocus = (c) => { cards.forEach(cc => cc.classList.remove('focused')); c.classList.add('focused'); focusedTicketId = c.dataset.ticket; c.scrollIntoView({behavior:'smooth', block:'nearest'}); };
  if (e.key === 'j'){ e.preventDefault(); setFocus(cards[Math.min(idx+1, cards.length-1)] || cards[0]); }
  else if (e.key === 'k'){ e.preventDefault(); setFocus(cards[Math.max(idx-1, 0)] || cards[0]); }
  else if ((e.key === 'Enter' || e.key === ' ') && focused){ e.preventDefault(); toggleCard(focused.dataset.ticket); }
  else if (e.key === 'a' && focused){ e.preventDefault(); decide(focused.dataset.ticket, 'approve'); }
  else if (e.key === 'd' && focused){ e.preventDefault(); decide(focused.dataset.ticket, 'defer'); }
  else if ((e.key === 'r' || e.key === 'c') && focused){ e.preventDefault(); document.getElementById('comment-'+focused.dataset.ticket)?.focus(); }
});

/* ---------------------------------------------------------------------
   Init + gentle auto-refresh (skips while you're typing a note)
   ------------------------------------------------------------------- */
// Deep-link the active tab: #team / #trends survive a refresh or bookmark.
(function initTab(){
  const h = (location.hash || '').replace('#', '');
  if (h === 'team' || h === 'trends' || h === 'now' || h === 'history'){
    currentView = h;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === h));
  }
})();
boot(false);
if (!STATIC_MODE) {
  setInterval(() => {
    if (['TEXTAREA','INPUT'].includes(document.activeElement?.tagName)) return;  // don't yank mid-decision
    if (document.hidden) return;
    boot(true);
  }, 120000);
}
</script>

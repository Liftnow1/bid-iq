<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liftnow Agent Team — Today</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#fafbfc; --card:#ffffff; --border:#e1e4e8; --muted:#6a737d;
    --fg:#24292e; --fg-dim:#586069;
    --ok:#22863a; --warn:#b08800; --err:#d73a49; --accent:#0366d6;
    --priority-high:#d73a49; --priority-med:#b08800; --priority-low:#22863a;
    /* Agent colors */
    --a-content:#0366d6; --a-sem:#d97706; --a-seo:#0891b2;
    --a-backlink:#7c3aed; --a-keyword:#be185d; --a-linkedin:#15803d;
    --a-uiux:#0d9488; --a-competitor:#9333ea; --a-coordinator:#1f2937;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:#f6f8fa}
  h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);background:#f6f8fa}
  .tab{padding:10px 18px;background:none;border:none;color:var(--muted);font:inherit;cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--fg);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--fg-dim)}
  .count{display:inline-block;background:#e1e4e8;color:var(--muted);padding:1px 6px;border-radius:10px;font-size:11px;margin-left:4px;min-width:18px;text-align:center;font-variant-numeric:tabular-nums}
  .tab.active .count{background:var(--accent);color:#fff}
  main{max-width:1080px;margin:0 auto;padding:16px 24px 32px}

  /* === Coordinator strip === */
  .coord-strip{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden;transition:max-height 240ms cubic-bezier(0.4,0,0.2,1)}
  .coord-strip-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
  .coord-strip-head:hover{background:#f6f8fa}
  .health-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .health-green{background:var(--ok)} .health-yellow{background:var(--warn)} .health-red{background:var(--err)} .health-unknown{background:var(--muted)}
  .coord-summary{flex:1;font-size:13px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .coord-strip-pills{display:flex;gap:6px;flex-shrink:0}
  .pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#e1e4e8;color:var(--muted);cursor:pointer}
  .pill.has-conflicts{background:rgba(176,136,0,.15);color:var(--warn)}
  .pill.has-redflags{background:rgba(215,58,73,.15);color:var(--err)}
  .pill.has-synergies{background:rgba(34,134,58,.15);color:var(--ok)}
  .coord-strip-body{padding:0 16px 16px;border-top:1px solid var(--border);display:none}
  .coord-strip.expanded .coord-strip-body{display:block}
  .coord-section{margin-top:12px}
  .coord-section h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px;font-weight:600}
  .coord-item{padding:6px 10px;background:#f6f8fa;border-radius:6px;margin-bottom:4px;font-size:13px}
  .coord-priority{display:flex;align-items:center;gap:8px}
  .rank-chip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;background:var(--accent);color:#fff;font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .ticket-link{color:var(--accent);text-decoration:none;font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;cursor:pointer}
  .ticket-link:hover{text-decoration:underline}
  .coord-no-brief{color:var(--muted);font-style:italic;font-size:13px}

  /* === Toolbar === */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .meta{color:var(--muted);font-size:12px}
  .toolbar input[type=text],.toolbar select{background:#fff;color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font:inherit;font-size:13px}
  .toolbar input[type=text]{flex:1;min-width:160px}
  .toolbar .spacer{flex:1}

  /* === Cards === */
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;transition:opacity 200ms ease-out,transform 200ms ease-out;position:relative}
  .card.low{background:#fafbfc;opacity:.92}
  .card.collapsed .body,.card.collapsed .actions,.card.collapsed .coord-context{display:none}
  .card.focused{outline:2px solid var(--accent);outline-offset:4px}
  .card.red-flag{box-shadow:inset 3px 0 0 var(--err)}
  .card.fading{opacity:0;transform:translateX(8px)}
  .card-head{display:flex;align-items:center;gap:10px;cursor:pointer;min-height:24px}
  .rank-chip.in-card{margin-right:2px}
  .agent-badge{background:var(--badge-bg,#e7f0fe);color:var(--badge-fg,var(--accent));padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
  .priority{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .priority-HIGH{background:rgba(215,58,73,.15);color:var(--priority-high)}
  .priority-MEDIUM{background:rgba(176,136,0,.15);color:var(--priority-med)}
  .priority-LOW{background:rgba(34,134,58,.15);color:var(--priority-low)}
  .subject{flex:1;font-weight:600;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card.collapsed .subject{white-space:nowrap}
  .card:not(.collapsed) .subject{white-space:normal}
  .age{color:var(--muted);font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .age.old{color:var(--warn)} .age.stale{color:var(--err)}
  .redflag-dot{width:8px;height:8px;border-radius:50%;background:var(--err);flex-shrink:0}
  .exec-status{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
  .exec-queued{background:#e1e4e8;color:var(--muted)}
  .exec-executing{background:rgba(3,102,214,.15);color:var(--accent);animation:pulse 1.5s ease-in-out infinite}
  .exec-completed{background:rgba(34,134,58,.15);color:var(--ok)}
  .exec-failed{background:rgba(215,58,73,.15);color:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

  .coord-context{margin-top:10px;padding:8px 10px;background:#f0f7ff;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;font-size:12px;color:var(--fg-dim)}
  .coord-conflict{background:#fffbea;border-left-color:var(--warn);color:#7a5d00}
  .body{margin-top:10px;color:var(--fg-dim);white-space:pre-wrap;font-size:13px;background:#f6f8fa;border:1px solid var(--border);border-radius:6px;padding:10px 12px;max-height:280px;overflow:auto}
  .body details{margin-top:8px}
  .body pre{margin:6px 0;font-size:12px}
  .dm-note{margin-top:6px;font-size:12px;color:var(--muted);font-style:italic}
  .section{margin:10px 0}
  .section-label{font-size:11px;font-weight:700;color:var(--fg-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
  .section-body{white-space:pre-wrap;font-size:14px;line-height:1.4}
  .section-approve{background:#f0fdf4;border-left:3px solid var(--ok);padding:6px 10px;margin:8px 0;border-radius:4px}
  .section-reject{background:#fef2f2;border-left:3px solid #e74c3c;padding:6px 10px;margin:8px 0;border-radius:4px}

  .actions{margin-top:10px;display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap}
  .comment{flex:1;min-width:200px;background:#fff;color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font:inherit;resize:vertical;min-height:34px;max-height:200px}
  .btn{background:#fff;color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font:inherit;font-size:13px;cursor:pointer;white-space:nowrap}
  .btn:hover{background:#f0f3f6}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn[disabled]{opacity:.5;cursor:wait}
  .btn-approve{background:#2ea043;border-color:#22863a;color:#fff}
  .btn-approve:hover{background:#22863a}
  .btn-cond{background:#6f42c1;border-color:#5a32a3;color:#fff}
  .btn-cond:hover{background:#5a32a3}
  .btn-defer{background:#b08800;border-color:#855700;color:#fff}
  .btn-defer:hover{background:#855700}
  .btn-reject{background:#d73a49;border-color:#b31d28;color:#fff}
  .btn-reject:hover{background:#b31d28}
  .btn-ack{background:var(--accent);border-color:#024ea4;color:#fff;font-weight:600}
  .btn-ack:hover{background:#024ea4}
  .btn.refresh{padding:5px 10px}

  /* === NEW: Today dashboard === */
  .hero-do{background:linear-gradient(135deg,#0366d6 0%,#0846a8 100%);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 4px 14px rgba(3,102,214,.18)}
  .hero-do h2{margin:0 0 4px;font-size:20px;font-weight:700;letter-spacing:-.01em}
  .hero-do .hero-sub{opacity:.85;font-size:13px;margin-bottom:14px}
  .hero-list{display:flex;flex-direction:column;gap:8px}
  .hero-item{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform 120ms,background 120ms}
  .hero-item:hover{background:rgba(255,255,255,.2);transform:translateX(4px)}
  .hero-num{width:28px;height:28px;border-radius:50%;background:#fff;color:#0366d6;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .hero-text{flex:1;font-size:14px}
  .hero-text .label{opacity:.75;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
  .hero-empty{text-align:center;padding:18px;opacity:.85;font-size:14px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .kpi-value{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-top:2px;font-variant-numeric:tabular-nums}
  .kpi-trend{font-size:11px;margin-top:2px;font-variant-numeric:tabular-nums}
  .kpi-trend.up{color:var(--ok)}
  .kpi-trend.down{color:var(--err)}
  .kpi-trend.flat{color:var(--muted)}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .panel-title{font-size:14px;font-weight:600;color:var(--fg);margin:0}
  .panel-sub{font-size:12px;color:var(--muted)}
  #roi-chart-wrap{position:relative;height:260px}
  #roi-source-notice{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}

  .recent-feed{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
  .feed-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f6f8fa;border-radius:6px;font-size:13px}
  .feed-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .feed-icon.done{background:rgba(34,134,58,.15);color:var(--ok)}
  .feed-icon.alert{background:rgba(215,58,73,.15);color:var(--err)}
  .feed-icon.info{background:rgba(3,102,214,.15);color:var(--accent)}
  .feed-text{flex:1;color:var(--fg)}
  .feed-time{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}

  .health-strip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:13px;color:var(--fg-dim)}
  .health-strip .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .health-strip .dot.ok{background:var(--ok)}
  .health-strip .dot.err{background:var(--err)}

  /* === Toast === */
  .toast{position:fixed;right:24px;bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;animation:slidein .2s ease-out;max-width:320px;z-index:1000;box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .toast.ok{border-color:var(--ok)}
  .toast.err{border-color:var(--err)}
  @keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* === Misc === */
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  .reports-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
  .stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .stat-value{font-size:28px;font-weight:700;color:var(--fg);font-variant-numeric:tabular-nums}
  .stat-sub{color:var(--muted);font-size:12px;margin-top:4px}
  h2{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px}
  .agent-row{display:flex;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:13px}

  /* === Shortcut hint === */
  .shortcut-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(36,41,46,.92);color:#fff;padding:6px 14px;border-radius:18px;font-size:11px;z-index:999;font-family:ui-monospace,SFMono-Regular,monospace}
  .shortcut-hint.fade-out{opacity:0;transition:opacity 800ms ease-out}

  /* === Polished Today === */
  .hero-do{background:linear-gradient(135deg,#0366d6 0%,#1f4ea8 100%);color:#fff;border-radius:14px;padding:24px 28px;margin-bottom:18px;box-shadow:0 6px 24px rgba(3,102,214,.2)}
  .hero-do h2{margin:0 0 6px;color:#fff;text-transform:none;letter-spacing:-.01em;font-size:14px;font-weight:700;opacity:.95;letter-spacing:.08em}
  .hero-do .hero-sub{color:rgba(255,255,255,.85);font-size:13px;margin-bottom:14px}
  .hero-do .hero-list{display:flex;flex-direction:column;gap:8px}
  .hero-do .hero-item{display:flex;gap:14px;align-items:flex-start;padding:12px 14px;background:rgba(255,255,255,.10);border-radius:10px;cursor:pointer;transition:background .15s}
  .hero-do .hero-item:hover{background:rgba(255,255,255,.18)}
  .hero-do .hero-num{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.20);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
  .hero-do .hero-text{flex:1;color:#fff;font-size:14px;line-height:1.4}
  .hero-do .hero-text .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.7);margin-bottom:2px;font-weight:600}
  .hero-do .hero-empty{color:rgba(255,255,255,.85);font-size:14px;text-align:center;padding:22px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:transform .15s,box-shadow .15s}
  .kpi:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.06)}
  .kpi-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
  .kpi-value{font-size:24px;font-weight:700;color:var(--fg);font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1.1}
  .kpi-trend{color:var(--muted);font-size:11px;margin-top:4px}
  .kpi-trend.up{color:var(--ok)}
  .kpi-trend.down{color:var(--err)}
  .kpi-trend.flat{color:var(--muted)}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap}
  .panel-title{font-size:14px;font-weight:700;color:var(--fg);margin:0}
  .panel-sub{color:var(--muted);font-size:12px}

  /* Segmented toggle */
  .seg-toggle{display:inline-flex;gap:0;background:#f0f3f6;border:1px solid var(--border);border-radius:8px;padding:2px}
  .seg-btn{background:none;border:none;padding:5px 12px;font:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:6px;transition:all .15s}
  .seg-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .seg-btn:hover:not(.active){color:var(--fg)}

  #roi-chart-wrap{height:280px;position:relative}

  .recent-feed{display:flex;flex-direction:column;gap:2px;max-height:340px;overflow-y:auto}
  .feed-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;transition:background .12s}
  .feed-item:hover{background:#f6f8fa}
  .feed-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .feed-icon.done{background:rgba(34,134,58,.15);color:var(--ok)}
  .feed-icon.alert{background:rgba(215,58,73,.15);color:var(--err)}
  .feed-icon.info{background:rgba(3,102,214,.15);color:var(--accent)}
  .feed-text{flex:1;font-size:13px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .feed-time{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;flex-shrink:0}

  /* === Failure banner === */
  .failure-banner{display:flex;align-items:center;gap:14px;background:rgba(176,136,0,.10);border:1px solid rgba(176,136,0,.35);border-radius:8px;padding:14px 18px;margin-bottom:14px;color:var(--fg)}
  .failure-banner.urgent{background:rgba(215,58,73,.10);border-color:rgba(215,58,73,.5)}
  .failure-banner .fb-icon{font-size:24px;flex-shrink:0}
  .failure-banner .fb-text{flex:1}
  .failure-banner .fb-title{font-weight:700;font-size:14px;color:var(--fg)}
  .failure-banner .fb-sub{font-size:12px;color:var(--fg-dim);margin-top:2px}
  .failure-banner .btn{flex-shrink:0;background:#fff;border:1px solid var(--border)}
  .failure-banner.urgent .btn{border-color:var(--err);color:var(--err)}

  /* === Team / Personas === */
  .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:8px}
  .persona{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;position:relative;display:flex;flex-direction:column;gap:10px}
  .persona:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .persona-head{display:flex;gap:12px;align-items:center}
  .avatar{width:48px;height:48px;border-radius:50%;background:#f0f3f6;flex-shrink:0;overflow:hidden;border:1px solid var(--border)}
  .avatar img{width:100%;height:100%;display:block}
  .persona-name{font-weight:700;font-size:15px;color:var(--fg);line-height:1.2}
  .persona-role{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .persona-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-dim)}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .status-dot.live{background:var(--ok);box-shadow:0 0 0 0 rgba(34,134,58,.6);animation:livepulse 2s infinite}
  .status-dot.idle{background:#9ca3af}
  .status-dot.stale{background:var(--warn)}
  .status-dot.dead{background:var(--err)}
  @keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(34,134,58,.6)}70%{box-shadow:0 0 0 6px rgba(34,134,58,0)}100%{box-shadow:0 0 0 0 rgba(34,134,58,0)}}
  .persona-tagline{font-size:12px;color:var(--fg-dim);line-height:1.4;flex:1}
  .persona-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px}
  .persona-foot .schedule{font-variant-numeric:tabular-nums}

  .pmodal-close{margin-left:auto;background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:6px}

  .pmodal-body{padding:18px 22px 22px}
  .pmodal-section{margin-bottom:18px}
  .pmodal-section h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 6px;font-weight:600}
  .pmodal-section p{margin:0;font-size:14px;line-height:1.5;color:var(--fg)}
  .interact-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .interact-chip{background:#f0f3f6;color:var(--fg-dim);padding:3px 10px;border-radius:14px;font-size:12px;cursor:pointer}
  .interact-chip:hover{background:#e1e4e8;color:var(--fg)}
  .interact-chip .arr{margin-right:5px;color:var(--muted)}
  .activity-feed{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
  .activity-item{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
  .activity-item:last-child{border-bottom:none}
  .activity-item .when{color:var(--muted);font-size:11px;margin-right:8px;font-variant-numeric:tabular-nums}
  .activity-empty{padding:14px;text-align:center;color:var(--muted);font-size:13px}
  .feedback-list{max-height:160px;overflow-y:auto;margin-bottom:8px}

  .feedback-empty{color:var(--muted);font-size:13px;font-style:italic;padding:6px 0}
  .feedback-form{display:flex;flex-direction:column;gap:8px}
  .feedback-form textarea{background:#fff;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font:inherit;font-size:13px;resize:vertical;min-height:80px}
  .feedback-form textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(3,102,214,.1)}
  .feedback-form-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .feedback-form-row .hint{color:var(--muted);font-size:11px}

  /* === Mobile === */
  @media (max-width:640px){
    main{padding:12px}
    .toolbar{flex-direction:column;align-items:stretch}
    .toolbar input[type=text],.toolbar select{width:100%}
    .actions{flex-direction:column}
    .comment{width:100%}
    .btn{width:100%}
    .team-grid{grid-template-columns:1fr 1fr;gap:10px}
    .pmodal{max-width:100%;max-height:96vh}
    .pmodal-head{padding:14px 16px}
    .pmodal-body{padding:14px 16px}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Liftnow Agent Approvals</h1>
    <div class="sub">10-agent marketing team · <span id="last-refresh">connecting…</span></div>
  </div>
  <button class="btn refresh" onclick="loadCurrentTab()">Refresh</button>
</header>

<div class="tabs">
  <button class="tab active" data-view="today" onclick="switchTab('today')">Today</button>
  <button class="tab" data-view="team" onclick="switchTab('team')">Team</button>
  <button class="tab" data-view="activity" onclick="switchTab('activity')">Activity <span class="count" id="count-activity"></span></button>
  <button class="tab" data-view="pending" onclick="switchTab('pending')">Needs You <span class="count" id="count-pending"></span></button>
  <button class="tab" data-view="inbox" onclick="switchTab('inbox')">Inbox <span class="count" id="count-inbox"></span></button>
  <button class="tab" data-view="done" onclick="switchTab('done')">All Done</button>
  <button class="tab" data-view="learnings" onclick="switchTab('learnings')">Learnings</button>
  <button class="tab" data-view="stats" onclick="switchTab('stats')">Stats</button>
</div>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<!-- Persona modal -->
<div class="pmodal-backdrop" id="pmodal" onclick="if(event.target===this)closePersona()">
  <div class="pmodal" id="pmodal-content"></div>
</div>

<script>
const API_BASE = 'https://agents.liftnowdirect.com/webhook';
const AGENT_SECRET = 'LiftnowAgentTeam_kS9-bGq2_xVtN4mP';  // shared with n8n auth guard
let currentView = 'today';
let roiChart = null;  // Chart.js instance
let cachedPending = null;
let cachedInbox = null;
let cachedDone = null;
let coordinatorBrief = null;
let agentFilter = 'all';
let searchTerm = '';
let sortMode = 'priority';
let focusedTicketId = null;
let shortcutHintShown = sessionStorage.getItem('shortcutHintShown') === '1';

const AGENT_COLORS = {
  'Content Producer':       {bg:'rgba(3,102,214,.12)', fg:'#0366d6'},
  'SEM Manager':            {bg:'rgba(217,119,6,.12)', fg:'#d97706'},
  'SEO Optimizer':          {bg:'rgba(8,145,178,.12)', fg:'#0891b2'},
  'Backlink Builder':       {bg:'rgba(124,58,237,.12)', fg:'#7c3aed'},
  'Keyword Discovery':      {bg:'rgba(190,24,93,.12)', fg:'#be185d'},
  'LinkedIn Cadence':       {bg:'rgba(21,128,61,.12)', fg:'#15803d'},
  'UI/UX Performance':      {bg:'rgba(13,148,136,.12)', fg:'#0d9488'},
  'Competitor SERP Monitor':{bg:'rgba(147,51,234,.12)', fg:'#9333ea'},
  'Coordinator':            {bg:'rgba(31,41,55,.12)', fg:'#1f2937'},
  'Content Decay Detector': {bg:'rgba(180,83,9,.12)', fg:'#b45309'},
  'Brand Listening':        {bg:'rgba(120,113,108,.12)', fg:'#78716c'},
  'Daily Briefing':         {bg:'rgba(82,82,91,.12)', fg:'#52525b'},
};
function agentColor(name){ return AGENT_COLORS[name] || {bg:'#f0f3f6', fg:'#586069'}; }

function isReport(t){
  const s = t.subject || '';
  const rt = (t.recommendationType || '').toLowerCase();
  return /\bsummary\b|\[coordinator\]|\[briefing\]|\[patterns?\]|^weekly |^monthly |weekly (report|summary|backlink|sem|keyword)|monthly (report|summary|keyword)|daily briefing/i.test(s)
      || /^report$|^summary$|^daily digest$|^daily briefing$|^dashboard insight$/.test(rt);
}

function switchTab(view){
  currentView = view;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.view===view));
  loadCurrentTab();
}

async function loadCurrentTab(){
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading…</div>';
  try {
    if (currentView === 'today') {
      await renderToday();
    } else if (currentView === 'team') {
      await renderTeam();
    } else if (currentView === 'stats') {
      await renderStats();
    } else if (currentView === 'learnings') {
      await renderLearnings();
    } else if (currentView === 'done') {
      const data = await fetchTickets('done');
      cachedDone = data;
      renderList(data, 'done');
    } else if (currentView === 'activity') {
      // Activity = autonomous agent receipts (stage 3 + outcome_notes contains AUTO_EXECUTED)
      const data = await fetchTickets('done');
      cachedDone = data;
      const receipts = (data.tickets || []).filter(t => (t.outcomeNotes || '').includes('AUTO_EXECUTED'));
      document.getElementById('count-activity').textContent = receipts.length || '';
      document.getElementById('last-refresh').textContent = 'updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      renderList({tickets: receipts}, 'activity');
    } else {
      const data = await fetchTickets('pending');
      cachedPending = data;
      const reports = (data.tickets || []).filter(isReport);
      const proposals = (data.tickets || []).filter(t => !isReport(t));
      // Extract Coordinator brief from pending or inbox
      const coordTicket = (data.tickets || []).find(t => t.agent === 'Coordinator' && (t.recommendationType||'').toLowerCase().includes('briefing'));
      coordinatorBrief = parseCoordinatorBrief(coordTicket);
      document.getElementById('count-pending').textContent = proposals.length || '';
      document.getElementById('count-inbox').textContent = reports.length || '';
      document.getElementById('last-refresh').textContent = 'updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      if (currentView === 'inbox') {
        renderList({tickets: reports}, 'inbox');
      } else {
        renderPending(proposals);
      }
    }
  } catch (e) {
    main.innerHTML = `<div class="empty">Error: ${escapeHtml(e.message)}<br><br><button class="btn" onclick="loadCurrentTab()">Retry</button></div>`;
  }
}

function parseCoordinatorBrief(ticket){
  if (!ticket) return null;
  try {
    const detail = JSON.parse(ticket.recommendationDetail || '{}');
    return {ticketId: ticket.ticketId, ageHours: ticket.ageHours, ...detail};
  } catch (e) { return null; }
}

async function fetchTickets(view){
  const r = await fetch(`${API_BASE}/agent-proposals?view=${view}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// Parse content into ASK/WHY/IF YOU APPROVE/IF YOU REJECT sections when present.
// Falls back to raw escaped content for unmigrated tickets.
function renderTicketContent(content){
  const raw = String(content || '');
  if (!raw.trim()) return '(no detail)';
  // Quick check: all four markers present, each at the start of a line
  const hasAsk = /(^|\n)ASK\s*\n/.test(raw);
  const hasWhy = /(^|\n)WHY\s*\n/.test(raw);
  const hasApprove = /(^|\n)IF YOU APPROVE\s*\n/.test(raw);
  if (!(hasAsk && hasWhy && hasApprove)) {
    return escapeHtml(raw);
  }
  // Split on the four section headers, capturing the body between each.
  // The order in the structured format is fixed: ASK, WHY, IF YOU APPROVE, IF YOU REJECT (reject optional for safety).
  const re = /(^|\n)(ASK|WHY|IF YOU APPROVE|IF YOU REJECT)\s*\n/g;
  const sections = {};
  const matches = [];
  let m;
  while ((m = re.exec(raw)) !== null) {
    // headerStart = where the leading newline (or string start) is — the boundary that ends the previous section
    // bodyStart = where the section's body content begins (after the header and its trailing newline)
    matches.push({label: m[2], headerStart: m.index, bodyStart: m.index + m[0].length});
  }
  for (let i = 0; i < matches.length; i++) {
    const end = i + 1 < matches.length ? matches[i+1].headerStart : raw.length;
    sections[matches[i].label] = raw.slice(matches[i].bodyStart, end).replace(/\s+$/, '');
  }
  let html = '';
  if (sections['ASK']) {
    html += `<div class="section"><div class="section-label">Ask</div><div class="section-body">${escapeHtml(sections['ASK'])}</div></div>`;
  }
  if (sections['WHY']) {
    html += `<div class="section"><div class="section-label">Why</div><div class="section-body">${escapeHtml(sections['WHY'])}</div></div>`;
  }
  if (sections['IF YOU APPROVE']) {
    html += `<div class="section-approve"><div class="section-label">If you approve</div><div class="section-body">${escapeHtml(sections['IF YOU APPROVE'])}</div></div>`;
  }
  if (sections['IF YOU REJECT']) {
    html += `<div class="section-reject"><div class="section-label">If you reject</div><div class="section-body">${escapeHtml(sections['IF YOU REJECT'])}</div></div>`;
  }
  return html;
}

function ageLabel(hours){
  if (hours < 1) return 'just now';
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours/24)}d ago`;
}
function ageClass(hours){
  if (hours > 120) return 'stale';
  if (hours > 48) return 'old';
  return '';
}

function renderCoordStrip(){
  if (!coordinatorBrief) {
    return `<div class="coord-strip"><div class="coord-strip-head">
      <span class="health-dot health-unknown"></span>
      <span class="coord-no-brief">Coordinator brief pending (next run 10:00 AM ET)</span>
    </div></div>`;
  }
  const b = coordinatorBrief;
  const healthClass = b.overall_health === 'green' ? 'health-green' : b.overall_health === 'yellow' ? 'health-yellow' : b.overall_health === 'red' ? 'health-red' : 'health-unknown';
  const summary = (b.executive_summary || '').slice(0, 100);
  const conflictsCount = (b.conflicts || []).length;
  const synergiesCount = (b.synergies || []).length;
  const redflagsCount = (b.red_flags || []).length;
  let body = '';
  if (b.executive_summary) {
    body += `<div class="coord-section"><h3>Executive Summary</h3><div style="font-size:13px;color:var(--fg)">${escapeHtml(b.executive_summary)}</div></div>`;
  }
  if (b.priority_order && b.priority_order.length) {
    body += `<div class="coord-section"><h3>Today's priority order</h3>`;
    for (const p of b.priority_order) {
      body += `<div class="coord-item coord-priority"><span class="rank-chip">${p.rank}</span><a class="ticket-link" onclick="scrollToTicket('${p.ticket_id}')">${p.ticket_id}</a><span style="color:var(--fg-dim)">${escapeHtml(p.rationale || '')}</span></div>`;
    }
    body += `</div>`;
  }
  if (conflictsCount) {
    body += `<div class="coord-section"><h3>Conflicts (${conflictsCount})</h3>`;
    for (const c of b.conflicts) {
      body += `<div class="coord-item" style="background:#fffbea"><strong>[${(c.agents||[]).join(' vs ')}]</strong> ${escapeHtml(c.description)} <em style="color:var(--fg-dim)">→ ${escapeHtml(c.recommendation || '')}</em></div>`;
    }
    body += `</div>`;
  }
  if (synergiesCount) {
    body += `<div class="coord-section"><h3>Synergies (${synergiesCount})</h3>`;
    for (const s of b.synergies) {
      body += `<div class="coord-item" style="background:#f0fdf4"><a class="ticket-link" onclick="scrollToTicket('${s.primary_ticket_id}')">${s.primary_ticket_id}</a> → <strong>${escapeHtml(s.secondary_agent || '')}</strong>: ${escapeHtml(s.description)} <em style="color:var(--fg-dim)">→ ${escapeHtml(s.suggested_action || '')}</em></div>`;
    }
    body += `</div>`;
  }
  if (redflagsCount) {
    body += `<div class="coord-section"><h3 style="color:var(--err)">Red flags (${redflagsCount})</h3>`;
    for (const r of b.red_flags) {
      body += `<div class="coord-item" style="background:#fef2f2;color:var(--err)">${escapeHtml(r)}</div>`;
    }
    body += `</div>`;
  }
  return `<div class="coord-strip" id="coord-strip">
    <div class="coord-strip-head" onclick="toggleCoordStrip()">
      <span class="health-dot ${healthClass}" title="overall_health: ${b.overall_health || 'unknown'}"></span>
      <span class="coord-summary">${escapeHtml(summary)}${b.executive_summary && b.executive_summary.length > 100 ? '…' : ''}</span>
      <span class="coord-strip-pills">
        ${conflictsCount ? `<span class="pill has-conflicts">${conflictsCount} conflict${conflictsCount>1?'s':''}</span>` : ''}
        ${synergiesCount ? `<span class="pill has-synergies">${synergiesCount} synergy${synergiesCount>1?'ies':''}</span>` : ''}
        ${redflagsCount ? `<span class="pill has-redflags">${redflagsCount} red flag${redflagsCount>1?'s':''}</span>` : ''}
      </span>
    </div>
    <div class="coord-strip-body">${body}</div>
  </div>`;
}

function toggleCoordStrip(){
  const s = document.getElementById('coord-strip');
  if (s) s.classList.toggle('expanded');
}

function scrollToTicket(ticketId){
  const card = document.getElementById('card-'+ticketId);
  if (!card) return;
  card.scrollIntoView({behavior:'smooth', block:'center'});
  card.classList.remove('collapsed');
  card.classList.add('focused');
  focusedTicketId = ticketId;
  setTimeout(()=>card.classList.remove('focused'), 1800);
}

function enrichWithCoord(ticket){
  if (!coordinatorBrief) return {rank:null, rationale:null, conflicts:[], synergies:[]};
  const p = (coordinatorBrief.priority_order || []).find(p => String(p.ticket_id) === String(ticket.ticketId));
  const conflicts = (coordinatorBrief.conflicts || []).filter(c => (c.ticket_ids || []).map(String).includes(String(ticket.ticketId)));
  const synergies = (coordinatorBrief.synergies || []).filter(s => String(s.primary_ticket_id) === String(ticket.ticketId));
  const redflagged = (coordinatorBrief.red_flags || []).some(r => String(r).includes(String(ticket.ticketId)));
  return {rank: p ? p.rank : null, rationale: p ? p.rationale : null, conflicts, synergies, redflagged};
}

function getUniqueAgents(tickets){
  return [...new Set(tickets.map(t => t.agent || '(unknown)'))].sort();
}

function renderPending(tickets){
  const main = document.getElementById('main');
  let html = renderCoordStrip();
  const agents = getUniqueAgents(tickets);
  html += `<div class="toolbar">
    <span class="meta">${tickets.length} pending</span>
    ${agents.length > 1 ? `<select onchange="agentFilter=this.value;renderPending(cachedPending.tickets.filter(t=>!isReport(t)))">
      <option value="all">All agents</option>
      ${agents.map(a => `<option value="${escapeHtml(a)}" ${agentFilter===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}
    </select>` : ''}
    <input type="text" placeholder="Search…" value="${escapeHtml(searchTerm)}" oninput="searchTerm=this.value;renderPending(cachedPending.tickets.filter(t=>!isReport(t)))">
    <select onchange="sortMode=this.value;renderPending(cachedPending.tickets.filter(t=>!isReport(t)))">
      <option value="priority" ${sortMode==='priority'?'selected':''}>Coordinator priority</option>
      <option value="age" ${sortMode==='age'?'selected':''}>Age (newest)</option>
      <option value="agent" ${sortMode==='agent'?'selected':''}>Agent</option>
    </select>
    <span class="spacer"></span>
    <span class="meta" style="font-size:11px">j/k navigate · a approve · c condition · d defer · r reject · ? help</span>
  </div>`;
  let filtered = tickets;
  if (agentFilter !== 'all') filtered = filtered.filter(t => (t.agent||'') === agentFilter);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(t => ((t.subject||'') + ' ' + (t.content||'')).toLowerCase().includes(q));
  }
  // Sort
  if (sortMode === 'priority') {
    const rankMap = new Map();
    if (coordinatorBrief && coordinatorBrief.priority_order) {
      for (const p of coordinatorBrief.priority_order) rankMap.set(String(p.ticket_id), p.rank);
    }
    filtered.sort((a,b)=>{
      const ra = rankMap.get(String(a.ticketId));
      const rb = rankMap.get(String(b.ticketId));
      if (ra && rb) return ra - rb;
      if (ra) return -1;
      if (rb) return 1;
      // priority HIGH first, then by age
      const pOrder = {HIGH:1, MEDIUM:2, LOW:3};
      const pa = pOrder[a.priority] || 4;
      const pb = pOrder[b.priority] || 4;
      if (pa !== pb) return pa - pb;
      return (a.ageHours||0) - (b.ageHours||0);
    });
  } else if (sortMode === 'age') {
    filtered.sort((a,b)=>(a.ageHours||0) - (b.ageHours||0));
  } else if (sortMode === 'agent') {
    filtered.sort((a,b)=>(a.agent||'').localeCompare(b.agent||''));
  }
  if (!filtered.length) {
    html += '<div class="empty">Inbox zero ✨</div>';
  } else {
    html += filtered.map(t => renderCard(t, 'pending')).join('');
  }
  main.innerHTML = html;
  if (!shortcutHintShown && filtered.length) showShortcutHint();
}

function renderList(data, mode){
  const main = document.getElementById('main');
  const tickets = data.tickets || [];
  const labels = {pending:'needs your call', inbox:'reports & summaries', done:'completed in last 7 days', activity:'autonomous actions in last 7 days'};
  const emptyMsg = {pending:'Inbox zero ✨ — nothing needs you', inbox:'No reports to read', done:'No completed items yet', activity:'Agents have not run autonomously yet. Cron schedules every 5min–daily.'};
  let html = `<div class="toolbar"><span class="meta">${tickets.length} ${labels[mode]||''}</span></div>`;
  if (!tickets.length) {
    html += `<div class="empty">${emptyMsg[mode]||'Nothing here'}</div>`;
  } else {
    html += tickets.map(t => renderCard(t, mode)).join('');
  }
  main.innerHTML = html;
}

function renderCard(t, mode){
  const stageLabel = {'1':'Pending','2':'Approved','3':'In Progress','4':'Closed'}[t.stage] || t.stage;
  const c = agentColor(t.agent);
  const enriched = mode === 'pending' ? enrichWithCoord(t) : null;
  const isLowPriority = (t.priority || '').toUpperCase() === 'LOW';
  const cardClasses = ['card','collapsed'];
  if (isLowPriority && mode === 'pending') cardClasses.push('low');
  if (enriched && enriched.redflagged) cardClasses.push('red-flag');
  let actionsHtml = '';
  if (mode === 'pending') {
    actionsHtml = `
    <div class="actions">
      <textarea class="comment" id="comment-${t.ticketId}" placeholder="Optional comment / conditions…" oninput="autoGrow(this)"></textarea>
      <button class="btn btn-approve" onclick="decide('${t.ticketId}','approve',this)" title="a">Approve</button>
      <button class="btn btn-cond" onclick="decide('${t.ticketId}','conditional_approve',this)" title="c · approve with conditions in the comment box">Approve w/ Conditions</button>
      <button class="btn btn-defer" onclick="decide('${t.ticketId}','defer',this)" title="d">Defer 3d</button>
      <button class="btn btn-reject" onclick="decide('${t.ticketId}','reject',this)" title="r">Reject</button>
    </div>`;
  } else if (mode === 'inbox') {
    actionsHtml = `
    <div class="actions">
      <textarea class="comment" id="comment-${t.ticketId}" placeholder="Optional note for the agent…" oninput="autoGrow(this)"></textarea>
      <button class="btn btn-ack" onclick="decide('${t.ticketId}','acknowledge',this)" title="Mark as read — moves to Done">Acknowledge & Clear</button>
    </div>`;
  } else if (mode === 'activity') {
    actionsHtml = `
    <div class="actions">
      <textarea class="comment" id="comment-${t.ticketId}" placeholder="Tell the agent what to do differently next time… (saved as a Learning)" oninput="autoGrow(this)"></textarea>
      <button class="btn btn-ack" onclick="decide('${t.ticketId}','acknowledge',this)" title="File this receipt + feed the comment back to the agent">File &amp; Feedback</button>
    </div>`;
  }
  let coordCtx = '';
  if (enriched) {
    if (enriched.rank) {
      coordCtx += `<div class="coord-context">Coordinator ranked #${enriched.rank} — ${escapeHtml(enriched.rationale||'')}</div>`;
    }
    if (enriched.conflicts.length) {
      const conf = enriched.conflicts[0];
      coordCtx += `<div class="coord-context coord-conflict">⚠ Conflicts with: <strong>[${(conf.agents||[]).join(', ')}]</strong> — ${escapeHtml(conf.description||'')} <em>→ ${escapeHtml(conf.recommendation||'')}</em></div>`;

    }
  }
  const ageCls = ageClass(t.ageHours || 0);
  return `
  <div class="${cardClasses.join(' ')}" id="card-${t.ticketId}" data-ticket="${t.ticketId}">
    <div class="card-head" onclick="toggleCard('${t.ticketId}')">
      ${enriched && enriched.rank ? `<span class="rank-chip in-card">${enriched.rank}</span>` : ''}
      ${enriched && enriched.redflagged ? `<span class="redflag-dot" title="Coordinator flagged"></span>` : ''}

    </div>
    ${coordCtx}
    <div class="body">${renderTicketContent(t.content)}
      ${t.recommendationDetail ? `<details><summary style="margin-top:8px;cursor:pointer;color:var(--muted)">Recommendation detail</summary><pre>${escapeHtml(t.recommendationDetail)}</pre></details>` : ''}
      ${t.outcomeNotes ? `<details open><summary style="margin-top:8px;cursor:pointer;color:var(--muted)">Outcome notes</summary><pre>${escapeHtml(t.outcomeNotes)}</pre></details>` : ''}
    </div>
    ${actionsHtml}
  </div>`;
}

function toggleCard(id){

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function decide(ticketId, decision, btn){
  const comment = document.getElementById('comment-'+ticketId)?.value || '';
  if (decision === 'conditional_approve' && !comment.trim()) {
    toast('Conditional approve needs a condition in the comment box', 'err');
    return;
  }
  if (decision === 'reject' && !comment.trim()) {
    toast('Reject needs a reason in the comment — the team learns from this', 'err');
    return;
  }
  const card = document.getElementById('card-'+ticketId);
  card.querySelectorAll('button').forEach(b => b.disabled = true);
  card.classList.add('fading');
  // Optimistic
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);
  try {
    const r = await fetch(`${API_BASE}/process-decision`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'x-agent-secret': AGENT_SECRET},
      body: JSON.stringify({ticketId, decision, comment, deferDays: 3, secret: AGENT_SECRET}),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const label = decision === 'conditional_approve' ? 'CONDITIONAL APPROVE' : decision.toUpperCase();
    toast(`${label} sent`, 'ok');
    setTimeout(() => {
      card.remove();
      advanceFocus(ticketId);
      // Update pending count
      if (cachedPending) {
        cachedPending.tickets = cachedPending.tickets.filter(t => t.ticketId !== ticketId);
        const proposals = cachedPending.tickets.filter(t => !isReport(t));
        document.getElementById('count-pending').textContent = proposals.length || '';
      }
    }, 250);
  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') {
      toast('Timed out — try again, no decision was saved', 'err');
    } else {
      toast('Failed: '+e.message, 'err');
    }
    card.classList.remove('fading');
    card.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

function advanceFocus(removedId){
  const cards = Array.from(document.querySelectorAll('.card[data-ticket]'));
  if (!cards.length) return;
  const next = cards[0];
  if (next) {
    next.classList.add('focused');
    focusedTicketId = next.dataset.ticket;
    next.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

async function triggerKillSwitch(){
  const action = confirm('PAUSE ALL EMAIL + EXECUTION AGENTS?\n\nThis will deactivate 8 agents: SEM Manager, Backlink Builder, Backlink Poster, LinkedIn Cadence, Content Producer, SEO Optimizer, UI/UX Performance, Content Decay.\n\nThey will stop firing until you reactivate.\n\nClick OK to deactivate, Cancel to abort.');
  if (!action) return;
  const btn = document.getElementById('kill-switch-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Pausing…'; }
  try {
    const r = await fetch(`${API_BASE}/kill-switch`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'x-agent-secret': AGENT_SECRET},
      body: JSON.stringify({action: 'deactivate', secret: AGENT_SECRET})
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast('All risky agents PAUSED. Reactivate from n8n UI when ready.', 'ok');
    if (btn) { btn.textContent = 'All agents paused'; btn.style.background = '#fff5f5'; }
  } catch (e) {
    toast(`Kill switch failed: ${e.message}`, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Emergency: pause all agents'; }
  }
}

function toast(msg, kind='ok'){

  t.textContent = msg;

  setTimeout(() => {t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)}, 2500);
}

// === Keyboard navigation ===
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (currentView !== 'pending') return;
  const cards = Array.from(document.querySelectorAll('.card[data-ticket]'));
  if (!cards.length) return;
  const focused = focusedTicketId ? cards.find(c => c.dataset.ticket === focusedTicketId) : null;
  const idx = focused ? cards.indexOf(focused) : -1;
  const setFocus = (c) => {
    cards.forEach(cc => cc.classList.remove('focused'));
    c.classList.add('focused');
    c.classList.remove('collapsed');
    focusedTicketId = c.dataset.ticket;
    c.scrollIntoView({behavior:'smooth', block:'nearest'});
  };
  if (e.key === 'j') { e.preventDefault(); setFocus(cards[Math.min(idx+1, cards.length-1)] || cards[0]); }
  else if (e.key === 'k') { e.preventDefault(); setFocus(cards[Math.max(idx-1, 0)] || cards[0]); }
  else if (e.key === 'a' && focused) { e.preventDefault(); decide(focused.dataset.ticket, 'approve'); }
  else if (e.key === 'c' && focused) { e.preventDefault(); const ta = document.getElementById('comment-'+focused.dataset.ticket); if (ta) ta.focus(); }
  else if (e.key === 'd' && focused) { e.preventDefault(); decide(focused.dataset.ticket, 'defer'); }
  else if (e.key === 'r' && focused) { e.preventDefault(); const ta = document.getElementById('comment-'+focused.dataset.ticket); if (ta) ta.focus(); }
  else if (e.key === '/' ) { e.preventDefault(); document.querySelector('input[type=text]')?.focus(); }
  else if (e.key === 'Enter' && focused) { e.preventDefault(); focused.classList.toggle('collapsed'); }
});

async function renderToday(){
  const main = document.getElementById('main');
  // Fetch all data in parallel
  const [pendingRes, doneRes, inboxRes, roiRes, hbRes] = await Promise.allSettled([
    fetchTickets('pending'),
    fetchTickets('done'),
    fetchTickets('inbox'),
    fetch(`${API_BASE}/roi-data`).then(r => r.ok ? r.json() : null).catch(()=>null),
    fetch(`${API_BASE}/agent-heartbeat?action=read&limit=30`).then(r => r.ok ? r.json() : null).catch(()=>null)
  ]);
  const pendingData = pendingRes.status === 'fulfilled' ? pendingRes.value : {tickets:[]};
  const doneData = doneRes.status === 'fulfilled' ? doneRes.value : {tickets:[]};
  const inboxData = inboxRes.status === 'fulfilled' ? inboxRes.value : {tickets:[]};
  const roi = roiRes.status === 'fulfilled' ? roiRes.value : null;
  const hb = hbRes.status === 'fulfilled' ? hbRes.value : null;

  // Compute 24h failure count from inbox + pending
  const allTickets = [...(inboxData.tickets||[]), ...(pendingData.tickets||[])];
  const failures24h = allTickets.filter(t => /Agent Failed|ESCALATED/i.test(t.subject||'') && (t.ageHours||999) < 24);
  const escalatedNow = (pendingData.tickets||[]).filter(t => /ESCALATED/i.test(t.subject||''));

  // Identify hero items: prefer Triage Digest's top5 ticket if present today; fall back to top 3 pending
  let heroItems = [];
  const triageT = (pendingData.tickets || []).concat(doneData.tickets || []).find(t => /^\[TRIAGE\]/i.test(t.subject||''));

    try {
      const detail = JSON.parse(triageT.recommendationDetail || '{}');

      const lookup = {};
      (pendingData.tickets || []).forEach(t => { lookup[t.ticketId] = t; });

  if (heroItems.length === 0) {
    // Fallback: top 3 by priority/age from pending (skip reports)
    heroItems = (pendingData.tickets || [])
      .filter(t => !isReport(t))
      .sort((a,b) => {
        const pw = {HIGH:3,MEDIUM:2,LOW:1};
        return (pw[(b.priority||'LOW').toUpperCase()]||1) - (pw[(a.priority||'LOW').toUpperCase()]||1);

  const allDone = doneData.tickets || [];

  const recentAuto = autoExec.filter(t => (t.ageHours||999) < 24*7);
  const todayMs = 24 * 3600 * 1000;
  const todayAuto = autoExec.filter(t => (t.ageHours||999) < 24);

  // Pull from new ROI shape: roi.totals.google_ads_spend_30d / .google_ads_conversions_30d / .google_ads_cpa / .google_ads_ctr_pct

    <div class="kpi"><div class="kpi-label">Google 30d spend</div><div class="kpi-value">$${Math.round(t.google_ads_spend_30d || 0).toLocaleString()}</div><div class="kpi-trend flat">${t.google_ads_clicks_30d || 0} clicks</div></div>
    <div class="kpi"><div class="kpi-label">30d conversions</div><div class="kpi-value">${(t.google_ads_conversions_30d ?? 0)}</div><div class="kpi-trend flat">${t.google_ads_cpa ? 'CPA $'+t.google_ads_cpa : 'no conversions'}</div></div>
    <div class="kpi"><div class="kpi-label">CTR</div><div class="kpi-value">${t.google_ads_ctr_pct ? t.google_ads_ctr_pct+'%' : '—'}</div><div class="kpi-trend flat">${Math.round((t.google_ads_impressions_30d||0)/1000)}k impressions</div></div>
    <div class="kpi"><div class="kpi-label">MS daily budget</div><div class="kpi-value">$${(roi.microsoft_daily_budget_total||0).toFixed(0)}</div><div class="kpi-trend flat">${(roi.microsoft_campaigns||[]).filter(c=>c.status==='Active').length} active campaigns</div></div>
    <div class="kpi"><div class="kpi-label">Auto-actions 7d</div><div class="kpi-value">${recentAuto.length}</div><div class="kpi-trend ${todayAuto.length>0?'up':'flat'}">${todayAuto.length} today</div></div>
  ` : `
    <div class="kpi"><div class="kpi-label">Ad spend</div><div class="kpi-value">—</div><div class="kpi-trend flat">ROI data not yet pulled</div></div>
    <div class="kpi"><div class="kpi-label">Auto-actions 7d</div><div class="kpi-value">${recentAuto.length}</div></div>

  `;

  // Build hero HTML
  let heroHtml = '';
  if (heroItems.length === 0) {
    heroHtml = '<div class="hero-empty">Inbox zero. Nothing requires you right now. ✨</div>';
  } else {
    heroHtml = `<div class="hero-list">` + heroItems.map((t, i) => `
      <div class="hero-item" onclick="switchTab('pending'); setTimeout(()=>scrollToTicket('${t.ticketId}'),300)">

      </div>

  }

  // Build recent feed (last 10 auto-executed)
  const recentItems = autoExec.slice(0, 10);
  const feedHtml = recentItems.length === 0 ? '<div class="meta">No agent activity in the last week yet.</div>' : recentItems.map(t => {

  // === News feed: heartbeats + tickets merged + grouped by hour, plain-English ===
  const heartbeats = (hb && hb.heartbeats) || [];

  // Animal emoji lookup
  const AGENT_EMOJI = {
    carla:'🦉', sam:'🐝', max:'🦊', riley:'🦊', sem:'🦊',

  function emojiFor(agentId){ return AGENT_EMOJI[agentId] || '🐾'; }

  // Build news items from heartbeats (last 24h) + recent ticket activity
  const newsItems = [];
  for (const h of heartbeats.slice(0, 40)) {

  // Add tickets created in last 24h as "produced something" items

function setChartView(view) {
  window.__chartView = view;
  document.querySelectorAll('#chart-toggle .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  const stats = document.getElementById('compare-stats');
  if (stats) stats.style.display = view === 'compare' ? 'block' : 'none';
  renderRoiChart(view);
}

function renderRoiChart(view) {
  const roi = window.__roi;
  if (!roi || !roi.ok || !roi.daily) return;
  const ctx = document.getElementById('roi-chart');
  if (!ctx) return;
  if (roiChart) { roiChart.destroy(); roiChart = null; }

  const labels = roi.daily.map(d => d.date.slice(5));
  const googleSpend = roi.daily.map(d => (d.by_source?.google_ads?.spend) ?? d.spend ?? 0);
  const conv = roi.daily.map(d => d.conversions);
  const msDailyBudget = roi.microsoft_daily_budget_total || 0;
  const datasets = [];

  if (view === 'google') {
    datasets.push({
      label: 'Google Ads spend ($)',
      data: googleSpend,
      backgroundColor: 'rgba(3, 102, 214, 0.7)',
      borderColor: 'rgba(3, 102, 214, 1)',
      borderWidth: 1,
      yAxisID: 'y1',
      order: 2
    });
    datasets.push({
      label: 'Conversions',
      data: conv,
      type: 'line',
      borderColor: 'rgba(34, 134, 58, 1)',
      backgroundColor: 'rgba(34, 134, 58, 0.12)',
      yAxisID: 'y2',
      tension: 0.3,
      borderWidth: 2,
      pointRadius: 4,
      fill: true,
      order: 1
    });
  } else if (view === 'microsoft') {
    // Microsoft: REAL historical daily spend (via Vercel /api/ms-ads-unzip) — same chart shape as Google view
    const msSpend = roi.daily.map(d => (d.by_source?.microsoft_ads?.spend) ?? 0);
    const msClicks = roi.daily.map(d => (d.by_source?.microsoft_ads?.clicks) ?? 0);
    datasets.push({
      label: 'Microsoft Ads spend ($)',
      data: msSpend,
      backgroundColor: 'rgba(217, 119, 6, 0.75)',
      borderColor: 'rgba(217, 119, 6, 1)',
      borderWidth: 1,
      yAxisID: 'y1',
      order: 2
    });
    datasets.push({
      label: 'Microsoft Ads clicks',
      data: msClicks,
      type: 'line',
      borderColor: 'rgba(0, 0, 0, 0.6)',
      backgroundColor: 'rgba(0, 0, 0, 0.05)',
      yAxisID: 'y2',
      tension: 0.3,
      borderWidth: 2,
      pointRadius: 3,
      order: 1
    });
  } else if (view === 'compare') {
    // Apples-to-apples: stacked bars per day showing Google + Microsoft actual spend
    const msSpend = roi.daily.map(d => (d.by_source?.microsoft_ads?.spend) ?? 0);
    datasets.push({
      label: 'Google Ads spend',
      data: googleSpend,
      backgroundColor: 'rgba(3, 102, 214, 0.75)',
      borderColor: 'rgba(3, 102, 214, 1)',
      borderWidth: 1,
      yAxisID: 'y1',
      stack: 'total',
      order: 3
    });
    datasets.push({
      label: 'Microsoft Ads spend',
      data: msSpend,
      backgroundColor: 'rgba(217, 119, 6, 0.75)',
      borderColor: 'rgba(217, 119, 6, 1)',
      borderWidth: 1,
      yAxisID: 'y1',
      stack: 'total',
      order: 2
    });
    datasets.push({
      label: 'Conversions',
      data: conv,
      type: 'line',
      borderColor: 'rgba(34, 134, 58, 1)',
      backgroundColor: 'rgba(34, 134, 58, 0.10)',
      yAxisID: 'y2',
      tension: 0.3,
      borderWidth: 2,
      pointRadius: 3,
      order: 1
    });
  }

  // Default (vertical) chart for google + compare
  if (view !== 'microsoft') {
    roiChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: labels, datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { boxWidth: 12, font: { size: 12 } } },
            tooltip: { callbacks: { label: ctx => {
              if (ctx.dataset.label.startsWith('Google Ads spend')) return `Google Ads spend: $${ctx.parsed.y.toFixed(2)}`;

              return `${ctx.dataset.label}: ${ctx.parsed.y}`;

            y2: { type: 'linear', position: 'right', title: { display: true, text: 'Conversions' }, beginAtZero: true, grid: { display: false }, ticks: { stepSize: 1 } }

async function renderLearnings(){
  const main = document.getElementById('main');
  const done = await fetchTickets('done');
  const tickets = (done.tickets || []).filter(t => (t.outcomeNotes||'').startsWith('REJECTED'));
  const byAgent = {};
  for (const t of tickets) {
    const a = t.agent || '(unknown)';
    byAgent[a] = byAgent[a] || [];
    byAgent[a].push(t);
  }
  const sortedAgents = Object.entries(byAgent).sort((a,b) => b[1].length - a[1].length);
  let html = `<div class="toolbar"><span class="meta">${tickets.length} rejections in last 7 days — the team learns from these</span></div>`;
  if (!tickets.length) {
    html += '<div class="empty">No rejections yet. Nothing learned from the no-pile.</div>';
  } else {
    for (const [agent, list] of sortedAgents) {
      const c = agentColor(agent);
      html += `<h2 style="color:${c.fg}">${escapeHtml(agent)} <span style="color:var(--muted);font-weight:400">(${list.length})</span></h2>`;
      for (const t of list) {
        const comment = (t.outcomeNotes||'').replace(/^REJECTED\s+\S+\s*—?\s*/, '').trim();
        html += `
        <div class="card collapsed" id="card-${t.ticketId}">
          <div class="card-head" onclick="toggleCard('${t.ticketId}')">
            <span class="priority priority-${escapeHtml(t.priority||'LOW')}">${escapeHtml(t.priority||'LOW')}</span>
            <span class="subject">${escapeHtml(t.subject)}</span>
            <span class="age">${ageLabel(t.ageHours||0)}</span>
          </div>
          <div class="body">${comment ? '<strong>Paul:</strong> ' + escapeHtml(comment) + '\n\n' : '<em>(no comment given)</em>\n\n'}---ORIGINAL PROPOSAL---\n${escapeHtml(t.content || '')}</div>
        </div>`;
      }
    }
  }
  main.innerHTML = html;
}

function avatarHtml(p){
  // Cute animal emoji in a tinted circle. Tint uses persona's brand color.
  const bg = p.color ? `${p.color}22` : '#f0f3f6';
  const border = p.color ? `${p.color}55` : 'var(--border)';
  return `<div class="avatar" style="background:${bg};border-color:${border};display:flex;align-items:center;justify-content:center;font-size:28px;line-height:1">${p.emoji || '🐾'}</div>`;
}

function relativeAge(iso){
  if(!iso) return '—';
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.round(ms/60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.round(mins/60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.round(hrs/24);
  return days + 'd ago';
}

function statusForLastSeen(iso){
  if (!iso) return {cls:'idle', label:'no activity yet'};
  const ms = Date.now() - new Date(iso).getTime();
  const hrs = ms/3600000;
  if (hrs < 1) return {cls:'live', label:'active'};
  if (hrs < 12) return {cls:'idle', label:'idle'};
  if (hrs < 48) return {cls:'stale', label:'quiet'};
  return {cls:'dead', label:'silent'};
}

// Unified persona matcher used by both grid and modal
function matchTicket(p, t){
  const subj = (t.subject || '').toLowerCase();
  const notes = (t.outcomeNotes || '').toLowerCase();
  const agent = (t.agent || '').toLowerCase();
  // SEM — merged Tally + Maverick
  if (p.id === 'sem') {
    return subj.includes('sem auto') || subj.includes('sem ag') ||
           notes.includes('google ads budget mutated') || notes.includes('email_sent') || notes.includes('sent sem email');
  }
  // Reddit — merged Whisper + Sonar (both Reddit/community)
  if (p.id === 'reddit') {
    return agent.includes('community engagement') || agent.includes('brand listening') ||
           subj.includes('reddit') || subj.includes('community engagement') || subj.includes('brand listening');
  }
  // Briefing — merged Sift + Maestro
  if (p.id === 'briefing') {
    return agent.includes('coordinator') || agent.includes('daily briefing') || agent.includes('ticket triage') ||
           subj.includes('[briefing]') || subj.includes('[coordinator]') || subj.includes('[triage]');
  }
  // System personas
  if (p.id === 'sentinel') return subj.includes('agent failed') || subj.includes('failure');
  if (p.id === 'forge') return notes.includes('auto_executed') && (subj.includes('wp ') || subj.includes('linkedin') || subj.includes('email'));
  if (p.id === 'iris') return false; // Ledger has no tickets (data only)
  // Generic fuzzy
  return agent.includes(p.match.toLowerCase()) || subj.includes(p.match.toLowerCase());
}

    fetchTickets('done'),
    loadFeedbackCounts(),
    fetch(`${API_BASE}/agent-heartbeat?action=read&limit=200`).then(r => r.ok ? r.json() : null).catch(()=>null)
  ]);
  const tickets = (doneData.tickets || []);
  const heartbeats = (hbData && hbData.heartbeats) || [];

  const allPersonas = [...PERSONAS, ...SYSTEM_PERSONAS];

  // Determine last seen per persona: PREFER heartbeat (more accurate for silent agents)
  const lastByPersona = {};
  const fireCountsByPersona = {};
  for (const p of allPersonas) {
    const validIds = agentIdsForPersona(p.id);
    const hbForP = heartbeats.filter(h => validIds.includes(h.agentId));
    fireCountsByPersona[p.id] = hbForP.length;
    const lastHb = hbForP[0]; // already reverse-chronological from webhook
    const lastTicket = tickets.find(t => matchTicket(p, t));
    // Take the most recent of heartbeat or ticket
    const hbMs = lastHb ? new Date(lastHb.at).getTime() : 0;
    const tkMs = lastTicket ? new Date(lastTicket.createdAt).getTime() : 0;
    if (hbMs > tkMs) {
      lastByPersona[p.id] = { type: 'fire', when_iso: lastHb.at, summary: lastHb.summary, outcome: lastHb.outcome };

      lastByPersona[p.id] = { type: 'ticket', when_iso: lastTicket.createdAt, subject: lastTicket.subject };
    }
  }

  function personaCardHtml(p) {

    const fbCount = fbCounts[p.id] || 0;
    const fireCount = fireCountsByPersona[p.id] || 0;
    const summary = !last ? 'no activity yet'
      : last.type === 'fire'
        ? `${last.outcome === 'error' ? '⚠️' : last.outcome === 'action_taken' ? '✓' : '○'} ${(last.summary || '').slice(0, 50)}`
        : `📋 ${(last.subject || '').slice(0, 50)}`;
    return `<div class="persona" onclick="openPersona('${p.id}')">
      <div class="persona-head">
        ${avatarHtml(p)}
        <div>

      </div>
      <div class="persona-tagline">${p.tagline}</div>
      <div class="persona-status"><span class="status-dot ${status.cls}"></span><span>${status.label} · ${relativeAge(lastAt)} · ${summary}</span></div>
      <div class="persona-foot">
        <span class="schedule">${p.schedule}</span>
        <span style="display:flex;gap:6px">
          ${fireCount > 0 ? `<span class="comment-badge" style="background:rgba(34,134,58,.12);color:var(--ok)">⚡ ${fireCount}</span>` : ''}
          <span class="comment-badge ${fbCount===0?'zero':''}">\u{1F4AC} ${fbCount}</span>
        </span>
      </div>
    </div>`;
  }

  let html = '<h2 style="margin-top:0">Your Marketing Team</h2>';
  html += '<div class="meta" style="margin-bottom:14px">Click any agent to see their profile, recent activity, and leave them a note. Oracle reads all notes every Sunday night and adjusts the team accordingly.</div>';
  html += '<div class="team-grid">';
  for (const p of PERSONAS) html += personaCardHtml(p);
  html += '</div>';

  html += '<h2 style="margin-top:28px">System layer</h2>';
  html += '<div class="meta" style="margin-bottom:14px">Plumbing — these run quietly in the background. Sentinel catches crashes, Forge executes your approvals, Ledger powers the chart.</div>';
  html += '<div class="team-grid">';
  for (const p of SYSTEM_PERSONAS) html += personaCardHtml(p);
  html += '</div>';

  main.innerHTML = html;
}

// Expose ALL personas (marketing + system) for openPersona lookup
function allPersonasList(){ return [...PERSONAS, ...SYSTEM_PERSONAS]; }

  const p = allPersonasList().find(x => x.id === pid);
  if (!p) return;
  const modal = document.getElementById('pmodal');
  const content = document.getElementById('pmodal-content');

  content.innerHTML = `<div class="pmodal-head">
    ${avatarHtml(p)}
    <div class="pmodal-title">
      <h2>${p.name} <span style="color:var(--muted);font-weight:400;font-size:14px">— ${p.callsign || ''}</span></h2>
      <div class="role">${p.role} · ${p.schedule}</div>
    </div>
    <button class="pmodal-close" onclick="closePersona()">×</button>
  </div>
  <div class="pmodal-body">
    <div class="pmodal-section">
      <h3>What ${p.name} does</h3>
      <p>${p.bio}</p>
    </div>
    <div class="pmodal-section">
      <h3>Listens to</h3>
      <div class="interact-list">${p.listens_to.length ? p.listens_to.map(n => `<span class="interact-chip"><span class="arr">←</span>${n}</span>`).join('') : '<span class="meta">(self-directed)</span>'}</div>
    </div>
    <div class="pmodal-section">
      <h3>Feeds work to</h3>
      <div class="interact-list">${p.feeds_to.length ? p.feeds_to.map(n => `<span class="interact-chip"><span class="arr">→</span>${n}</span>`).join('') : '<span class="meta">(terminal)</span>'}</div>
    </div>
    <div class="pmodal-section">
      <h3>Recent activity</h3>
      <div id="pmodal-activity" class="activity-feed"><div class="activity-empty">Loading…</div></div>
    </div>
    <div class="pmodal-section">
      <h3>Tell ${p.name} what to do differently</h3>
      <div id="pmodal-feedback-list" class="feedback-list"><div class="feedback-empty">Loading…</div></div>
      <div class="feedback-form">
        <textarea id="pmodal-comment" placeholder="e.g. 'Stop using buzzwords.' / 'Be more aggressive on AG4 budget.' / 'Skip Reddit comments on r/marketing.'"></textarea>
        <div class="feedback-form-row">
          <span class="hint">Saved instantly. Oracle reviews every Sunday night and updates ${p.name}'s instructions.</span>
          <button class="btn primary" onclick="submitPersonaComment('${p.id}', '${p.name}')">Save note for ${p.name}</button>
        </div>
      </div>
    </div>
  </div>`;
  modal.classList.add('show');
  // Lazy-load activity + feedback
  loadPersonaActivity(p);
  loadPersonaFeedback(p.id);
}

function closePersona(){ document.getElementById('pmodal').classList.remove('show'); }

async function loadPersonaActivity(p){
  try {
    // Pull tickets AND heartbeats in parallel
    const [doneData, hbData] = await Promise.all([
      fetchTickets('done'),
      fetch(`${API_BASE}/agent-heartbeat?action=read&limit=100`).then(r => r.ok ? r.json() : null).catch(()=>null)
    ]);

    // Tickets matching this persona
    const tickets = (doneData.tickets || [])
      .filter(t => matchTicket(p, t))
      .map(t => ({
        kind: 'ticket',
        when: new Date(t.createdAt).getTime(),
        when_iso: t.createdAt,
        label: (t.subject || '').slice(0, 110),
        sub: (t.outcomeNotes || '').slice(0, 80),
        outcome: /Failed|ERROR/i.test(t.subject||'') ? 'error' : /\[done\]|AUTO_EXECUTED/i.test(t.subject || t.outcomeNotes || '') ? 'action' : 'info',
        link: `https://app.hubspot.com/contacts/_/ticket/${t.ticketId}`
      }));

    // Heartbeats matching this persona (by agentId — including merged personas)
    const validIds = agentIdsForPersona(p.id);
    const heartbeats = ((hbData && hbData.heartbeats) || [])
      .filter(h => validIds.includes(h.agentId))
      .map(h => ({
        kind: 'fire',
        when: new Date(h.at).getTime(),
        when_iso: h.at,
        label: '⚡ ' + (h.summary || h.action || 'fired'),
        sub: h.outcome === 'error' ? 'errored' : h.outcome === 'action_taken' ? 'success' : 'no-op',
        outcome: h.outcome === 'error' ? 'error' : h.outcome === 'action_taken' ? 'action' : 'noop',
        link: h.workflow_id && h.exec_id ? `https://agents.liftnowdirect.com/workflow/${h.workflow_id}/executions/${h.exec_id}` : null
      }));

    // Merge + sort reverse-chronological + cap
    const merged = [...tickets, ...heartbeats].sort((a,b) => b.when - a.when).slice(0, 25);

    const el = document.getElementById('pmodal-activity');
    if (!el) return;
    if (!merged.length){
      el.innerHTML = '<div class="activity-empty">No recent activity. Either ' + p.name + ' hasn’t fired yet today or the agent is paused.</div>';
      return;
    }
    el.innerHTML = merged.map(item => {
      const dot = item.outcome === 'error' ? '🔴' : item.outcome === 'action' ? '✅' : item.outcome === 'noop' ? '○' : 'ℹ️';
      const linkOpen = item.link ? `<a href="${item.link}" target="_blank" style="text-decoration:none;color:inherit">` : '';
      const linkClose = item.link ? '</a>' : '';
      return `<div class="activity-item">
        ${linkOpen}<span class="when">${dot} ${relativeAge(item.when_iso)}</span>
        ${escapeHtml(item.label)}
        ${item.sub ? '<div style="color:var(--muted);font-size:11px;margin-top:2px">'+escapeHtml(item.sub)+'</div>' : ''}
        ${linkClose}
      </div>`;
    }).join('');
  } catch (e) {
    const el = document.getElementById('pmodal-activity');
    if (el) el.innerHTML = '<div class="activity-empty">Couldn’t load activity.</div>';
  }
}

async function loadPersonaFeedback(pid){
  try {
    const r = await fetch('https://agents.liftnowdirect.com/webhook/agent-feedback?action=read&agentId=' + encodeURIComponent(pid));
    const j = await r.json();
    const fb = (j.feedback || []).slice().reverse();
    const el = document.getElementById('pmodal-feedback-list');
    if (!el) return;
    if (!fb.length){ el.innerHTML = '<div class="feedback-empty">No notes yet. Be the first.</div>'; return; }
    el.innerHTML = fb.map(f => `<div class="feedback-item">
      <span class="when">${relativeAge(f.at)}</span>
      ${escapeHtml(f.comment)}
    </div>`).join('');
  } catch (e) {
    const el = document.getElementById('pmodal-feedback-list');
    if (el) el.innerHTML = '<div class="feedback-empty">Couldn’t load notes.</div>';
  }
}

async function submitPersonaComment(pid, pname){
  const ta = document.getElementById('pmodal-comment');
  const comment = (ta.value || '').trim();
  if (!comment){ toast('Type a note first.', 'err'); return; }
  try {
    const r = await fetch('https://agents.liftnowdirect.com/webhook/agent-feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({agentId: pid, comment, source: 'ui'})
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    ta.value = '';
    toast(`✓ Saved. ${pname} will pick this up on the next run. Oracle will incorporate it into ${pname}'s instructions this Sunday.`, 'ok');
    loadPersonaFeedback(pid);
    cachedFeedbackCounts = null; // force refresh next time grid loads
  } catch (e) {
    toast('Send failed: ' + e.message, 'err');
  }
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { const m = document.getElementById('pmodal'); if (m && m.classList.contains('show')) closePersona(); }
});

async function renderStats(){
  const main = document.getElementById('main');
  const [pending, done] = await Promise.all([fetchTickets('pending'), fetchTickets('done')]);
  const proposals = pending.tickets.filter(t => !isReport(t));
  const reports = pending.tickets.filter(isReport);
  const dCount = done.tickets.length;
  const approved = done.tickets.filter(t=>(t.outcomeNotes||'').startsWith('APPROVED')).length;
  const cond = done.tickets.filter(t=>(t.outcomeNotes||'').startsWith('CONDITIONAL_APPROVE')).length;
  const rejected = done.tickets.filter(t=>(t.outcomeNotes||'').startsWith('REJECTED')).length;
  const acknowledged = done.tickets.filter(t=>(t.outcomeNotes||'').startsWith('ACKNOWLEDGED')).length;
  const decided = approved + cond + rejected;
  const approveRate = decided ? Math.round((approved+cond)*100/decided) : null;
  const byAgent = {};
  for (const t of [...pending.tickets, ...done.tickets]) {
    byAgent[t.agent] = (byAgent[t.agent]||0)+1;
  }
  const agentRows = Object.entries(byAgent).sort((a,b)=>b[1]-a[1]).map(([a,c])=>{
    const col = agentColor(a);
    return `<div class="agent-row"><span style="color:${col.fg};font-weight:600">${escapeHtml(a)}</span><span class="meta">${c}</span></div>`;
  }).join('');
  main.innerHTML = `
    <div class="reports-grid">
      <div class="stat"><div class="stat-label">Pending Decisions</div><div class="stat-value">${proposals.length}</div><div class="stat-sub">in Pending tab</div></div>
      <div class="stat"><div class="stat-label">Reports To Read</div><div class="stat-value">${reports.length}</div><div class="stat-sub">in Inbox tab</div></div>
      <div class="stat"><div class="stat-label">Last 7 Days</div><div class="stat-value">${dCount}</div><div class="stat-sub">processed</div></div>
      <div class="stat"><div class="stat-label">Approve Rate</div><div class="stat-value">${approveRate !== null ? approveRate+'%' : '—'}</div><div class="stat-sub">${approved} ✓ · ${cond} ✓w/cond · ${rejected} ✗ · ${acknowledged} ack</div></div>
    </div>
    <h2>Volume by Agent</h2>
    ${agentRows || '<div class="empty">No data yet</div>'}
  `;
}
